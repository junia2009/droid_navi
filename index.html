<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#b31e22">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RT91 Navi">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>RT91 Navi - ナビゲータードロイド</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000008; min-height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #c { position: fixed; inset: 0; }
    #info { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); color: rgba(180,190,210,0.45); font-size: 11px; letter-spacing: 2px; pointer-events: none; z-index: 10; display:none; }

    /* チャットUI */
    #chat-panel {
      position: fixed; bottom: 20px; right: 20px; width: min(380px, calc(100vw - 24px)); z-index: 100;
      font-family: 'Segoe UI', 'Meiryo', sans-serif;
    }
    #chat-log {
      max-height: min(320px, 36vh); overflow-y: auto; padding: 12px;
      background: rgba(10,12,24,0.85); border-radius: 16px 16px 0 0;
      border: 1px solid rgba(80,100,160,0.25); border-bottom: none;
      scrollbar-width: thin; scrollbar-color: rgba(80,100,160,0.3) transparent;
    }
    .msg { margin-bottom: 10px; display: flex; gap: 8px; align-items: flex-start; animation: msgIn 0.3s ease; }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: bold;
    }
    .msg.bot .msg-avatar { background: linear-gradient(135deg, #b31e22, #d44); color: #fff; }
    .msg.user .msg-avatar { background: linear-gradient(135deg, #1a3cb5, #3366dd); color: #fff; }
    .msg-bubble {
      padding: 8px 14px; border-radius: 12px; max-width: 280px;
      font-size: 13.5px; line-height: 1.55; word-break: break-word;
    }
    .msg.bot .msg-bubble { background: rgba(40,50,80,0.7); color: #d0d8e8; border: 1px solid rgba(80,100,160,0.2); }
    .msg.user .msg-bubble { background: rgba(26,60,181,0.35); color: #c8d4f0; border: 1px solid rgba(60,100,200,0.25); }
    .msg-bubble .weather-card {
      background: rgba(20,30,60,0.5); border-radius: 10px; padding: 10px; margin-top: 6px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px;
    }
    .weather-card .wc-main { grid-column: 1 / -1; text-align: center; margin-bottom: 4px; }
    .weather-card .wc-temp { font-size: 28px; font-weight: bold; color: #e8ecf4; }
    .weather-card .wc-desc { font-size: 12px; color: #8899bb; }
    .weather-card .wc-item { font-size: 12px; color: #99aabb; }
    .weather-card .wc-val { font-weight: 600; color: #c0ccdd; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    #chat-input-area {
      display: flex; gap: 0;
      background: rgba(14,16,28,0.92); border-radius: 0 0 16px 16px;
      border: 1px solid rgba(80,100,160,0.25); border-top: 1px solid rgba(80,100,160,0.1);
      overflow: hidden;
    }
    #chat-input {
      flex: 1; padding: 12px 16px; background: transparent; border: none;
      color: #c8d4f0; font-size: 16px; outline: none;
      font-family: 'Segoe UI', 'Meiryo', sans-serif;
      /* iOS Safari: 16px未満だとフォーカス時に自動ズームされるため16px固定 */
    }
    #chat-input::placeholder { color: rgba(130,150,190,0.5); }
    #chat-send {
      padding: 10px 18px; background: linear-gradient(135deg, #b31e22, #d44);
      border: none; color: #fff; cursor: pointer; font-size: 14px;
      transition: background 0.2s;
    }
    #chat-send:hover { background: linear-gradient(135deg, #d44, #e55); }

    /* ステータスバー */
    #status-bar {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 100;
      background: rgba(10,12,24,0.8); border: 1px solid rgba(80,100,160,0.2);
      border-radius: 24px; padding: 6px 20px; display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: #8899bb;
    }
    #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #2ecc71; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    #status-text { letter-spacing: 0.5px; }

    /* タイピングインジケーター */
    .typing-indicator { display: flex; gap: 4px; padding: 4px 0; }
    .typing-indicator span { width: 6px; height: 6px; background: #667; border-radius: 50%; animation: typBounce 1.4s infinite; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typBounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* APIキー設定モーダル */
    #apikey-modal {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7); align-items: center; justify-content: center;
    }
    #apikey-modal.open { display: flex; }
    #apikey-box {
      background: rgba(14,16,28,0.97); border: 1px solid rgba(80,100,160,0.35);
      border-radius: 18px; padding: 24px 20px; width: min(360px, calc(100vw - 32px));
      color: #c8d4f0; font-family: 'Segoe UI', 'Meiryo', sans-serif;
    }
    #apikey-box h3 { font-size: 15px; margin-bottom: 10px; color: #e0e8f8; }
    #apikey-box p  { font-size: 12px; color: #8899bb; margin-bottom: 14px; line-height: 1.6; }
    #apikey-input {
      width: 100%; padding: 10px 12px; background: rgba(30,35,60,0.8);
      border: 1px solid rgba(80,100,160,0.3); border-radius: 10px;
      color: #c8d4f0; font-size: 13px; outline: none; margin-bottom: 12px;
    }
    #apikey-save {
      width: 100%; padding: 10px; background: linear-gradient(135deg,#b31e22,#d44);
      border: none; border-radius: 10px; color: #fff; font-size: 14px; cursor: pointer;
    }
    #apikey-btn {
      position: fixed; top: 16px; right: 16px; z-index: 100;
      background: rgba(10,12,24,0.8); border: 1px solid rgba(80,100,160,0.2);
      border-radius: 50%; width: 36px; height: 36px; color: #8899bb;
      font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .apikey-link { color: #6699dd; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="info">DRAG TO ROTATE &#x2022; SCROLL TO ZOOM</div>

  <!-- APIキー設定ボタン -->
  <button id="apikey-btn" title="Gemini APIキー設定">⚙</button>

  <!-- APIキー設定モーダル -->
  <div id="apikey-modal">
    <div id="apikey-box">
      <h3>🔑 Gemini APIキー設定</h3>
      <p>APIキーはこのデバイスのみに保存されます（GitHubには一切アップされません）。<br>
        未取得の場合は <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener" class="apikey-link">こちら</a> で無料取得できます。</p>
      <input id="apikey-input" type="password" placeholder="AIzaSy..." autocomplete="off">
      <button id="apikey-save">保存して閉じる</button>
    </div>
  </div>

  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">RT91 Navi オンライン</span>
  </div>

  <div id="chat-panel">
    <div id="chat-log"></div>
    <div id="chat-input-area">
      <input id="chat-input" type="text" placeholder="RT91に話しかけてみよう..." autocomplete="off">
      <button id="chat-send">▶</button>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ===== シーン初期化 =====
    var scene = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, 0.1, 100);
    var renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setClearColor(0x000008);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    // ===== ライティング =====
    scene.add(new THREE.AmbientLight(0x8899bb, 0.55));
    var keyL = new THREE.DirectionalLight(0xfff4e0, 1.35);
    keyL.position.set(4, 7, 6); keyL.castShadow = true;
    keyL.shadow.mapSize.set(2048, 2048);
    keyL.shadow.camera.near = 0.5; keyL.shadow.camera.far = 20;
    keyL.shadow.camera.left = -3; keyL.shadow.camera.right = 3;
    keyL.shadow.camera.top = 3; keyL.shadow.camera.bottom = -1;
    scene.add(keyL);
    var fillL = new THREE.DirectionalLight(0xaaccff, 0.3); fillL.position.set(-4, 4, 5); scene.add(fillL);
    var rimL = new THREE.DirectionalLight(0x5577aa, 0.25); rimL.position.set(0, 3, -5); scene.add(rimL);
    var botL = new THREE.PointLight(0x334455, 0.2, 6); botL.position.set(0, -0.3, 3); scene.add(botL);

    // ===== 地面 =====
    var flMat = new THREE.MeshStandardMaterial({ color: 0x12121a, roughness: 0.88, metalness: 0.08 });
    var fl = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), flMat);
    fl.rotation.x = -Math.PI/2; fl.receiveShadow = true; scene.add(fl);
    var gr = new THREE.GridHelper(14, 28, 0x1c2844, 0x0e1828);
    gr.material.opacity = 0.18; gr.material.transparent = true; scene.add(gr);

    // ===== マテリアル =====
    var M = {
      wh: new THREE.MeshStandardMaterial({ color: 0xe6e6e6, roughness: 0.42, metalness: 0.06 }),
      whClean: new THREE.MeshStandardMaterial({ color: 0xeeeef2, roughness: 0.38, metalness: 0.04 }),
      rd: new THREE.MeshStandardMaterial({ color: 0xb31e22, roughness: 0.44, metalness: 0.06 }),
      rdDk: new THREE.MeshStandardMaterial({ color: 0x8a1518, roughness: 0.5, metalness: 0.08 }),
      bl: new THREE.MeshStandardMaterial({ color: 0x1a3cb5, roughness: 0.35, metalness: 0.08 }),
      sv: new THREE.MeshStandardMaterial({ color: 0x9aa0a8, roughness: 0.3, metalness: 0.55 }),
      svDk: new THREE.MeshStandardMaterial({ color: 0x686e76, roughness: 0.38, metalness: 0.48 }),
      dk: new THREE.MeshStandardMaterial({ color: 0x2c3038, roughness: 0.4, metalness: 0.5 }),
      bk: new THREE.MeshStandardMaterial({ color: 0x0e0e12, roughness: 0.12, metalness: 0.65 }),
      lens: new THREE.MeshStandardMaterial({ color: 0x080810, roughness: 0.04, metalness: 0.88, emissive: 0x0a0a18, emissiveIntensity: 0.15 }),
      hlM: new THREE.MeshBasicMaterial({ color: 0xffffff }),
      panelLine: new THREE.MeshStandardMaterial({ color: 0xccccd0, roughness: 0.55, metalness: 0.1 }),
    };

    // ===== ヘルパー =====
    function cy(r1,r2,h,s){ return new THREE.CylinderGeometry(r1,r2,h,s||28); }
    function sp(r,w,h){ return new THREE.SphereGeometry(r,w||20,h||16); }
    function bx(w,h,d){ return new THREE.BoxGeometry(w,h,d); }
    function tr(r,t,rs,ts){ return new THREE.TorusGeometry(r,t,rs||10,ts||40); }

    // =====================================================
    //  RT91ドロイド 完全再構築
    // =====================================================
    var droid = new THREE.Group();

    // 基準寸法（実物比率ベース）
    // ドーム半径: 0.7
    // ボディ高さ: 1.6  上径0.7  下径0.64（テーパー）
    // ドームリム厚: 0.06
    // 全高(足底〜ドーム頂): 約3.6

    // ============================================
    //  DOME（頭部）- 赤ベース + 白パネル
    // ============================================
    var dome = new THREE.Group(); dome.name='dome';
    var DR = 0.7; // ドーム半径

    // ドーム本体（赤ベース）
    var domeShell = new THREE.Mesh(
      new THREE.SphereGeometry(DR, 36, 22, 0, Math.PI*2, 0, Math.PI*0.5),
      M.rd
    );
    domeShell.castShadow = true;
    dome.add(domeShell);

    // === 白い水平バンド（ドーム下部 約30%位置の帯）===
    var bandMesh = new THREE.Mesh(
      new THREE.SphereGeometry(DR+0.003, 36, 4, 0, Math.PI*2, Math.PI*0.35, Math.PI*0.12),
      M.whClean
    );
    dome.add(bandMesh);

    // === 白い長方形パネル群 ===
    // 前面の白パネル（メインアイ周辺）
    function addDomePanel(angH, angV, w, h) {
      var g = bx(w, h, 0.008);
      var m = new THREE.Mesh(g, M.whClean);
      var r = DR + 0.005;
      m.position.set(
        Math.sin(angH) * Math.cos(angV) * r,
        Math.sin(angV) * r,
        Math.cos(angH) * Math.cos(angV) * r
      );
      m.lookAt(m.position.x * 2, m.position.y * 2, m.position.z * 2);
      dome.add(m);
    }

    // 前面メインアイ周辺の白パネル
    addDomePanel(0.08, 0.38, 0.28, 0.24);
    // 前面サブアイ下の白パネル
    addDomePanel(-0.36, 0.25, 0.12, 0.1);
    // 右側白パネル群
    addDomePanel(0.6, 0.42, 0.14, 0.14);
    addDomePanel(0.75, 0.3, 0.12, 0.08);
    addDomePanel(0.5, 0.2, 0.08, 0.06);
    // 左側白パネル群
    addDomePanel(-0.65, 0.4, 0.16, 0.12);
    addDomePanel(-0.8, 0.28, 0.1, 0.08);
    // 背面白パネル
    addDomePanel(Math.PI, 0.4, 0.18, 0.16);
    addDomePanel(Math.PI+0.35, 0.35, 0.14, 0.1);
    addDomePanel(Math.PI-0.4, 0.32, 0.12, 0.08);
    // 上部白パネル
    addDomePanel(0.3, 0.65, 0.12, 0.1);
    addDomePanel(-0.4, 0.7, 0.1, 0.08);
    addDomePanel(Math.PI*0.5, 0.6, 0.1, 0.08);

    // === 赤リム（ドームとボディの境界の太いリング）===
    var rimG = tr(DR, 0.05, 12, 44);
    var rim = new THREE.Mesh(rimG, M.rd);
    rim.rotation.x = Math.PI/2; rim.position.y = -0.015;
    dome.add(rim);

    // === レーダーディッシュ（頂上）===
    // ベースプレート
    var radarPlate = new THREE.Mesh(cy(0.22, 0.22, 0.025, 24), M.rd);
    radarPlate.position.y = DR * 0.92;
    dome.add(radarPlate);
    // 放射パターン（赤白交互 8セグメント）
    for (var ri = 0; ri < 8; ri++) {
      var rMat = ri % 2 === 0 ? M.whClean : M.rd;
      var sh = new THREE.Shape();
      var a1 = (ri/8)*Math.PI*2, a2 = ((ri+1)/8)*Math.PI*2;
      sh.moveTo(0, 0);
      for (var si = 0; si <= 10; si++) {
        var sa = a1 + (a2-a1)*si/10;
        sh.lineTo(Math.cos(sa)*0.2, Math.sin(sa)*0.2);
      }
      sh.lineTo(0, 0);
      var sm = new THREE.Mesh(new THREE.ShapeGeometry(sh), rMat);
      sm.rotation.x = -Math.PI/2;
      sm.position.y = DR * 0.92 + 0.014;
      dome.add(sm);
    }
    // 中央の赤円
    var radarC = new THREE.Mesh(cy(0.055, 0.055, 0.028, 12), M.rd);
    radarC.position.y = DR * 0.92 + 0.016;
    dome.add(radarC);
    // 灰色ノブ
    var knob = new THREE.Mesh(cy(0.035, 0.028, 0.065, 10), M.svDk);
    knob.position.y = DR * 0.92 + 0.05;
    dome.add(knob);

    // === メインアイ ===
    var eyeY = 0.28, eyeZ = DR - 0.01;
    // ハウジングリング
    var eyeHousing = new THREE.Mesh(cy(0.115, 0.12, 0.07, 22), M.dk);
    eyeHousing.rotation.x = Math.PI/2;
    eyeHousing.position.set(0.05, eyeY, eyeZ+0.03);
    dome.add(eyeHousing);
    // レンズ
    var mainLens = new THREE.Mesh(sp(0.095, 18, 14), M.lens);
    mainLens.scale.set(1, 1, 0.5);
    mainLens.position.set(0.05, eyeY, eyeZ+0.06);
    dome.add(mainLens);
    // ハイライト
    var hl = new THREE.Mesh(sp(0.03, 8, 6), M.hlM);
    hl.position.set(0.075, eyeY+0.04, eyeZ+0.075);
    dome.add(hl);

    // === セカンダリアイ（黒・小）===
    var subH = new THREE.Mesh(cy(0.05, 0.055, 0.04, 14), M.dk);
    subH.rotation.x = Math.PI/2;
    subH.position.set(-0.2, 0.17, eyeZ+0.01);
    dome.add(subH);
    var subL = new THREE.Mesh(sp(0.04, 10, 8), M.bk);
    subL.position.set(-0.2, 0.17, eyeZ+0.035);
    dome.add(subL);

    // === ホロプロジェクター（銀・側面）===
    var hp = new THREE.Mesh(cy(0.045, 0.045, 0.07, 12), M.svDk);
    hp.rotation.z = Math.PI/2;
    hp.position.set(-0.55, 0.32, 0.38);
    dome.add(hp);

    // === 小インジケーター ===
    var sqI = new THREE.Mesh(bx(0.06, 0.045, 0.008), M.whClean);
    sqI.position.set(-0.07, 0.2, eyeZ+0.005);
    sqI.lookAt(-0.07*2, 0.2*2, eyeZ*2);
    dome.add(sqI);

    dome.position.y = 1.875; // ボディ上面に配置
    droid.add(dome);

    // ============================================
    //  BODY（胴体）- 白テーパーシリンダー
    // ============================================
    var body = new THREE.Group(); body.name='main-body';
    var BR_TOP = 0.7, BR_BOT = 0.55, BH = 1.25;

    // メインシリンダー（テーパー）
    var bodyCyl = new THREE.Mesh(cy(BR_TOP, BR_BOT, BH, 36), M.wh);
    bodyCyl.position.y = 0;
    bodyCyl.castShadow = true;
    body.add(bodyCyl);

    // ===== 前面 ブルーストライプ（2本）=====
    var bsY1 = 0.34, bsY2 = 0.22;
    var bsZ = 0.69;
    // ストライプ背景フレーム
    var bsFrame = new THREE.Mesh(bx(0.5, 0.26, 0.03), M.sv);
    bsFrame.position.set(0, 0.28, bsZ);
    body.add(bsFrame);
    // 青ストライプ1
    var bs1 = new THREE.Mesh(bx(0.44, 0.07, 0.035), M.bl);
    bs1.position.set(0, bsY1, bsZ+0.005);
    body.add(bs1);
    // 青ストライプ2
    var bs2 = new THREE.Mesh(bx(0.44, 0.07, 0.035), M.bl);
    bs2.position.set(0, bsY2, bsZ+0.005);
    body.add(bs2);

    // ===== ベントグリル（ルーバー）左寄り =====
    var grillX = -0.18, grillY = -0.02;
    // グリル枠
    var gFrame = new THREE.Mesh(bx(0.2, 0.16, 0.02), M.sv);
    gFrame.position.set(grillX, grillY, bsZ);
    body.add(gFrame);
    // ルーバー（5本）
    for (var lv = 0; lv < 5; lv++) {
      var louver = new THREE.Mesh(bx(0.15, 0.012, 0.025), M.svDk);
      louver.position.set(grillX, grillY + 0.052 - lv*0.026, bsZ+0.01);
      body.add(louver);
    }

    // ===== 丸ポート群 =====
    function addPort(x, y, r, mat) {
      var p = new THREE.Mesh(cy(r, r, 0.03, 14), mat || M.sv);
      p.rotation.x = Math.PI/2;
      p.position.set(x, y, bsZ+0.01);
      body.add(p);
      var pi = new THREE.Mesh(cy(r*0.6, r*0.6, 0.02, 10), M.dk);
      pi.rotation.x = Math.PI/2;
      pi.position.set(x, y, bsZ+0.025);
      body.add(pi);
    }
    addPort(0.18, -0.0, 0.055);
    addPort(0.18, -0.10, 0.055);
    addPort(0.0, -0.28, 0.06);

    // ===== パネルライン（前面）=====
    // 縦ライン
    for (var pv = 0; pv < 4; pv++) {
      var vl = new THREE.Mesh(bx(0.005, BH*0.7, 0.01), M.panelLine);
      vl.position.set(-0.32 + pv*0.21, -0.04, 0.68);
      body.add(vl);
    }
    // 横ライン
    for (var ph2 = 0; ph2 < 5; ph2++) {
      var hl2 = new THREE.Mesh(bx(0.65, 0.004, 0.01), M.panelLine);
      hl2.position.set(0, 0.44 - ph2*0.22, 0.68);
      body.add(hl2);
    }

    // ===== サイドパネルライン =====
    for (var sp2 = 0; sp2 < 3; sp2++) {
      // 右側
      var svl = new THREE.Mesh(bx(0.01, BH*0.65, 0.004), M.panelLine);
      svl.position.set(0.68, -0.04, -0.2 + sp2*0.2);
      body.add(svl);
      // 左側
      var svlL = svl.clone();
      svlL.position.x = -0.68;
      body.add(svlL);
    }
    // サイド横ライン
    for (var shl = 0; shl < 4; shl++) {

    cvs.addEventListener('mousedown', function(e){ isDrag=true; pM={x:e.clientX,y:e.clientY}; });
    cvs.addEventListener('mousemove', function(e){ if(!isDrag)return; tRY+=(e.clientX-pM.x)*0.007; tRX+=(e.clientY-pM.y)*0.004; tRX=Math.max(-0.5,Math.min(0.7,tRX)); pM={x:e.clientX,y:e.clientY}; });
    cvs.addEventListener('mouseup', function(){ isDrag=false; });

    cvs.addEventListener('touchmove', function(e){ if(!isDrag)return; e.preventDefault(); tRY+=(e.touches[0].clientX-pM.x)*0.007; tRX+=(e.touches[0].clientY-pM.y)*0.004; tRX=Math.max(-0.5,Math.min(0.7,tRX)); pM={x:e.touches[0].clientX,y:e.touches[0].clientY}; },{passive:false});

    function getBaseCamDist() {
      var aspect = innerWidth / innerHeight;

      return aspect < 1 ? 4.8 + (1 - aspect) * 2.5 : 4.8;
    }

    // ===== iOS キーボード対応: visualViewport でチャットパネルを追従 =====
    var chatPanel = document.getElementById('chat-panel');
    function onViewportResize() {

    var aP = 0;

    // ===== ワンダリング（移動）状態 =====
    var wTarget = { x: 0, z: 0 };
    var wNextTime = Date.now() + 1500;
    var wSpeed = 0.02;

    // ===== ドームのキョロキョロ状態 =====
    var domeTargetY = 0, domeTargetX = 0;
    var domeNextTime = Date.now() + 800;

    // ===== カメラ追従 =====
    var camLookX = 0, camLookZ = 0;

    function animate() {
      requestAnimationFrame(animate);
      aP += 0.01;
      var now = Date.now();

      // --- ワンダリング目標更新 ---
      if (now > wNextTime) {
        wTarget.x = (Math.random() - 0.5) * 3.0;
        wTarget.z = (Math.random() - 0.5) * 1.8;
        wNextTime = now + 2000 + Math.random() * 4500;
        wSpeed = 0.012 + Math.random() * 0.028;
      }

      var dx = wTarget.x - droid.position.x;
      var dz = wTarget.z - droid.position.z;
      var dist = Math.sqrt(dx * dx + dz * dz);
      var movingFast = dist > 0.06;
      droid.position.x += dx * wSpeed;
      droid.position.z += dz * wSpeed;

      // 話しかけられた時はカメラ方向、移動中は移動方向にボディを向ける
      if (droidFacing && now < droidFacingEnd) {
        var toCamX = camera.position.x - droid.position.x;
        var toCamZ = camera.position.z - droid.position.z;
        var targetBodyY = Math.atan2(toCamX, toCamZ);
        var curY = droid.rotation.y;
        var diff = targetBodyY - curY;
        while (diff >  Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        droid.rotation.y += diff * 0.07;
      } else if (movingFast) {
        var targetBodyY = Math.atan2(dx, dz);
        var curY = droid.rotation.y;
        var diff = targetBodyY - curY;
        while (diff >  Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        droid.rotation.y += diff * 0.07;
      }

      // 移動時に前傾き
      var tiltX = movingFast ? -0.30 - dist * 0.07 : -0.30;
      droid.rotation.x += (tiltX - droid.rotation.x) * 0.06;

      // --- カメラ ---
      rY += (tRY - rY) * 0.08;
      rX += (tRX - rX) * 0.08;
      cD += (tCD - cD) * 0.08;
      camera.position.x = Math.sin(rY) * cD;
      camera.position.z = Math.cos(rY) * cD;
      camera.position.y = 1.6 + rX * 3.5;
      // ドロイドをカメラが追いかける
      camLookX += (droid.position.x - camLookX) * 0.04;
      camLookZ += (droid.position.z - camLookZ) * 0.04;
      camera.lookAt(camLookX, 0.95, camLookZ);

      // --- ドームのキョロキョロ ---
      if (now > domeNextTime) {
        domeTargetY = (Math.random() - 0.5) * 1.4;
        domeTargetX = (Math.random() - 0.35) * 0.35;
        domeNextTime = now + 600 + Math.random() * 1800;
      }
      var dm = droid.getObjectByName('dome');
      if (dm) {
        if (droidFacing && now < droidFacingEnd) {
          if (droidReacting && now < droidReactEnd) {
            // 反応アニメーション（頭振り）
            dm.rotation.y = Math.sin(aP * 4) * 0.6;
            dm.rotation.x = Math.sin(aP * 3) * 0.2;
          } else {
            droidReacting = false;
            // ボディがカメラを向いているので頭も正面（y=0）に向ける
            dm.rotation.y += (0 - dm.rotation.y) * 0.05;
            dm.rotation.x += (0.05 - dm.rotation.x) * 0.05;
          }
        } else {
          droidFacing = false;
          droidReacting = false;
          dm.rotation.y += (domeTargetY - dm.rotation.y) * 0.035;
          dm.rotation.x += (domeTargetX - dm.rotation.x) * 0.035;
        }
      }

      // --- ボディの自然な揺れ ---
      var bd = droid.getObjectByName('main-body');
      if (bd) {
        bd.rotation.z = Math.sin(aP * 0.9) * 0.018;
        var bounceAmt = movingFast ? Math.abs(Math.sin(aP * 3.5)) * 0.03 : 0;
        bd.position.y = 1.25 + Math.sin(aP * 1.4) * 0.012 + bounceAmt;
      }

      // --- 足の動き（移動中は交互に揺れ） ---
      var legL = droid.getObjectByName('leg-L');
      var legR = droid.getObjectByName('leg-R');
      if (legL && legR) {
        var legSwing = movingFast ? 0.15 : 0.0;
        legL.rotation.x += (Math.sin(aP * 3.5) * legSwing - legL.rotation.x) * 0.15;
        legR.rotation.x += (Math.sin(aP * 3.5 + Math.PI) * legSwing - legR.rotation.x) * 0.15;
      }

      // --- 星空のゆっくり回転 ---
      if (stars) { stars.rotation.y += 0.00015; stars.rotation.x += 0.00006; }

      // --- 地球の自転 ---
      if (earthMesh) {
        earthMesh.rotation.y += 0.0008;
      }

      renderer.render(scene, camera);
    }

    // --- 天気API (Open-Meteo / 無料・APIキー不要) ---
    var weatherCache = null;
    var weatherCacheTime = 0;

    function getWeather() {
      return new Promise(function(resolve, reject) {
        // 30分キャッシュ
        if (weatherCache && Date.now() - weatherCacheTime < 1800000) {
          resolve(weatherCache);
          return;
        }
        // 位置情報取得 -> 天気取得
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(function(pos) {
            fetchWeather(pos.coords.latitude, pos.coords.longitude).then(resolve).catch(reject);
          }, function() {
            // 位置取得失敗時は東京をデフォルト
            fetchWeather(35.6762, 139.6503).then(resolve).catch(reject);
          }, { timeout: 5000 });
        } else {
          fetchWeather(35.6762, 139.6503).then(resolve).catch(reject);
        }
      });
    }

    function fetchWeather(lat, lon) {
      var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon +
        '&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m' +
        '&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=Asia%2FTokyo&forecast_days=1';
      return fetch(url).then(function(r) { return r.json(); }).then(function(data) {
        weatherCache = data;
        weatherCacheTime = Date.now();
        return data;
      });
    }

    function weatherCodeToText(code) {
      var map = {
        0: ['☀️', '快晴'], 1: ['🌤', '晴れ時々曇り'], 2: ['⛅', '曇り'], 3: ['☁️', '曇り'],
        45: ['🌫️', '霧'], 48: ['🌫️', '霧氷'],
        51: ['🌦', '小雨'], 53: ['🌧', '雨'], 55: ['🌧', '強雨'],
        61: ['🌧', '小雨'], 63: ['🌧', '雨'], 65: ['🌧', '大雨'],
        71: ['❄️', '小雪'], 73: ['❄️', '雪'], 75: ['❄️', '大雪'],
        80: ['🌦', 'にわか雨'], 81: ['🌧', '雨'], 82: ['⛈', '豪雨'],
        95: ['⛈', '雷雨'], 96: ['⛈', '雷雨(雹)'], 99: ['⛈', '雷雨(雹)']
      };
      return map[code] || ['🌤', '不明'];
    }

    function formatWeatherResponse(data) {
      var c = data.current;
      var d = data.daily;
      var wc = weatherCodeToText(c.weather_code);
      var html = '<div>今の天気をお伝えします！</div>';
      html += '<div class="weather-card">';
      html += '<div class="wc-main"><span style="font-size:36px">' + wc[0] + '</span><br><span class="wc-desc">' + wc[1] + '</span></div>';
      html += '<div class="wc-main"><span class="wc-temp">' + c.temperature_2m + '°C</span></div>';
      html += '<div class="wc-item">体感: <span class="wc-val">' + c.apparent_temperature + '°C</span></div>';
      html += '<div class="wc-item">湿度: <span class="wc-val">' + c.relative_humidity_2m + '%</span></div>';
      html += '<div class="wc-item">風速: <span class="wc-val">' + c.wind_speed_10m + ' km/h</span></div>';
      if (d) {
        html += '<div class="wc-item">最高/最低: <span class="wc-val">' + d.temperature_2m_max[0] + '/' + d.temperature_2m_min[0] + '°C</span></div>';
      }
      html += '</div>';

      // アドバイス
      var temp = c.temperature_2m;
      if (temp >= 30) html += '<div style="margin-top:6px; font-size:12px; color:#e8a040;">☁ 熱中症に注意！水分補給を忘れずに！</div>';
      else if (temp <= 5) html += '<div style="margin-top:6px; font-size:12px; color:#70b8ff;">❄ 寒いです！暖かくしてお出かけください。</div>';
      if (c.weather_code >= 51) html += '<div style="margin-top:4px; font-size:12px; color:#7799cc;">\u2602 傷をお忘れなく！</div>';

      return html;
    }

    // --- 時刻・日付 ---
    function getTimeString() {
      var now = new Date();
      var h = now.getHours(), m = now.getMinutes();
      var period = h < 12 ? '午前' : '午後';
      var h12 = h % 12 || 12;
      return period + ' ' + h12 + ':' + (m < 10 ? '0' : '') + m;
    }
    function getDateString() {
      var now = new Date();
      var days = ['日', '月', '火', '水', '木', '金', '土'];
      return now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日(' + days[now.getDay()] + ')';
    }

    // --- 会話ロジック ---
    function processMessage(text) {
      var lower = text.toLowerCase();
      triggerDroidReaction();

      // 天気
      if (/天気|気温|温度|降水|雨|晴|曇|雪|予報|weather/i.test(lower)) {
        showTyping();
        getWeather().then(function(data) {
          removeTyping();
          addMsg(formatWeatherResponse(data), 'bot', true);
        }).catch(function() {
          removeTyping();
          addMsg('ピーガガー・ピー（天気情報の取得に失敗しました…）', 'bot');
        });
        return;
      }

      // 時刻
      if (/時刻|今何時|時間|time/i.test(lower)) {
        addMsg('現在の時刻は ' + getTimeString() + ' です！', 'bot');
        return;
      }

      // 日付
      if (/今日|日付|何日|曜日|date/i.test(lower)) {
        addMsg('今日は ' + getDateString() + ' です！', 'bot');
        return;
      }

      // 挨拶
      if (/こんにちは|こんばんは|おはよう|やあ|hello|hi|おつかれ|ただいま/i.test(lower)) {
        var greetings = [
          'ピーピー！こんにちは！今日は何かお手伝いしましょうか？',
          'ビープビープ！元気ですか？',
          'ピッピッ！RT91ナビ、准備完了です！'
        ];
        addMsg(greetings[Math.floor(Math.random()*greetings.length)], 'bot');
        return;
      }

      // 自己紹介
      if (/誰|名前|何者|自己紹介|who are you/i.test(lower)) {
        addMsg('ピーガガー！私はRT91ナビ、あなた専属のアストロメク・ナビゲータードロイドです！天気や時刻をお伝えできますよ！', 'bot');
        return;
      }

      // できること
      if (/できること|機能|ヘルプ|help|何が|what can/i.test(lower)) {
        addMsg('ピーピー！私にできること：\n\n☀️ 「天気を教えて」— 現在地の天気\n⏰ 「今何時？」— 現在時刻\n📅 「今日は何日？」— 日付・曜日\n😄 何でも話しかけてください！', 'bot');
        return;
      }

      // お礼
      if (/ありがとう|サンキュー|thanks|thank/i.test(lower)) {
        addMsg('ピーピー！どういたしまして！いつでも声をかけてくださいね！', 'bot');
        return;
      }

      // その他 → Gemini にフォールバック
      if (localStorage.getItem('rt91_gemini_key')) {
        callGemini(text);
      } else {
        var defaults = [
          'ピーガガー・ビープ！「できること」と聞いてみてください！',
          'ビードゥービードゥー！うまく理解できませんでした…「ヘルプ」で機能一覧が見られます！',
          'ピポポー！天気や時刻ならお任せください！右上 ⚙ でAPIキーを設定するともっと会話できます！'
        ];
        addMsg(defaults[Math.floor(Math.random()*defaults.length)], 'bot');
      }
    }

    // --- Gemini API ---

        contents: geminiHistory
      };
      fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=' + encodeURIComponent(key), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      }).then(function(r) {
        if (!r.ok) return r.json().then(function(e){ throw new Error('HTTP ' + r.status + ': ' + (e.error && e.error.message || '')); });
        return r.json();
      }).then(function(data) {
        removeTyping();
        var reply = data.candidates && data.candidates[0] && data.candidates[0].content &&
          data.candidates[0].content.parts && data.candidates[0].content.parts[0].text;
        if (!reply) throw new Error('no reply');
        geminiHistory.push({ role: 'model', parts: [{ text: reply }] });
        // 履歴が長くなりすぎないよう20ターンに制限
        if (geminiHistory.length > 40) geminiHistory = geminiHistory.slice(-40);
        addMsg(reply, 'bot');
      }).catch(function(e) {
        removeTyping();
        addMsg('ピーガガー！通信エラーが発生しました（' + e.message + '）。APIキーを確認してください。', 'bot');
      });
    }

    // --- イベント ---
    function onSend() {
      var text = chatInput.value.trim();
      if (!text) return;
      addMsg(text, 'user');
      chatInput.value = '';
      setTimeout(function() { processMessage(text); }, 400);
    }
    chatSend.addEventListener('click', onSend);
    chatInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); onSend(); }
    });

    // APIキー設定モーダル
    var apikeyModal = document.getElementById('apikey-modal');
    var apikeyInput = document.getElementById('apikey-input');
    document.getElementById('apikey-btn').addEventListener('click', function() {
      apikeyInput.value = localStorage.getItem('rt91_gemini_key') || '';
      apikeyModal.classList.add('open');
    });
    document.getElementById('apikey-save').addEventListener('click', function() {
      var k = apikeyInput.value.trim();
      if (k) localStorage.setItem('rt91_gemini_key', k);
      apikeyModal.classList.remove('open');
      addMsg('ピピー！APIキーを保存しました。これで自由に会話できます！', 'bot');
    });
    apikeyModal.addEventListener('click', function(e) {
      if (e.target === apikeyModal) apikeyModal.classList.remove('open');
    });

    // 起動時の挨拶
    setTimeout(function() {
      addMsg('ピーピー！RT91ナビです。今日は何をお手伝いしましょうか？\n「天気」「時刻」など話しかけてみてください！', 'bot');
    }, 1000);

    // Service Worker登録
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(function(reg) {
        console.log('SW registered:', reg.scope);
      }).catch(function(err) {
        console.log('SW registration failed:', err);
      });
    }
  </script>
</body>
</html>
