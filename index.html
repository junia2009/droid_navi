<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#b31e22">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RT91 Navi">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>RT91 Navi - ナビゲータードロイド</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000008; min-height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #c { position: fixed; inset: 0; }
    #info { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); color: rgba(180,190,210,0.45); font-size: 11px; letter-spacing: 2px; pointer-events: none; z-index: 10; display:none; }

    /* チャットUI */
    #chat-panel {
      position: fixed; bottom: 20px; right: 20px; width: min(380px, calc(100vw - 24px)); z-index: 100;
      font-family: 'Segoe UI', 'Meiryo', sans-serif;
    }
    #chat-log {
      max-height: min(320px, 36vh); overflow-y: auto; padding: 12px;
      background: rgba(10,12,24,0.85); border-radius: 16px 16px 0 0;
      border: 1px solid rgba(80,100,160,0.25); border-bottom: none;
      scrollbar-width: thin; scrollbar-color: rgba(80,100,160,0.3) transparent;
    }
    .msg { margin-bottom: 10px; display: flex; gap: 8px; align-items: flex-start; animation: msgIn 0.3s ease; }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: bold;
    }
    .msg.bot .msg-avatar { background: linear-gradient(135deg, #b31e22, #d44); color: #fff; }
    .msg.user .msg-avatar { background: linear-gradient(135deg, #1a3cb5, #3366dd); color: #fff; }
    .msg-bubble {
      padding: 8px 14px; border-radius: 12px; max-width: 280px;
      font-size: 13.5px; line-height: 1.55; word-break: break-word;
    }
    .msg.bot .msg-bubble { background: rgba(40,50,80,0.7); color: #d0d8e8; border: 1px solid rgba(80,100,160,0.2); }
    .msg.user .msg-bubble { background: rgba(26,60,181,0.35); color: #c8d4f0; border: 1px solid rgba(60,100,200,0.25); }
    .msg-bubble .weather-card {
      background: rgba(20,30,60,0.5); border-radius: 10px; padding: 10px; margin-top: 6px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px;
    }
    .weather-card .wc-main { grid-column: 1 / -1; text-align: center; margin-bottom: 4px; }
    .weather-card .wc-temp { font-size: 28px; font-weight: bold; color: #e8ecf4; }
    .weather-card .wc-desc { font-size: 12px; color: #8899bb; }
    .weather-card .wc-item { font-size: 12px; color: #99aabb; }
    .weather-card .wc-val { font-weight: 600; color: #c0ccdd; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    #chat-input-area {
      display: flex; gap: 0;
      background: rgba(14,16,28,0.92); border-radius: 0 0 16px 16px;
      border: 1px solid rgba(80,100,160,0.25); border-top: 1px solid rgba(80,100,160,0.1);
      overflow: hidden;
    }
    #chat-input {
      flex: 1; padding: 12px 16px; background: transparent; border: none;
      color: #c8d4f0; font-size: 16px; outline: none;
      font-family: 'Segoe UI', 'Meiryo', sans-serif;
      /* iOS Safari: 16px未満だとフォーカス時に自動ズームされるため16px固定 */
    }
    #chat-input::placeholder { color: rgba(130,150,190,0.5); }
    #chat-send {
      padding: 10px 18px; background: linear-gradient(135deg, #b31e22, #d44);
      border: none; color: #fff; cursor: pointer; font-size: 14px;
      transition: background 0.2s;
    }
    #chat-send:hover { background: linear-gradient(135deg, #d44, #e55); }

    /* ステータスバー */
    #status-bar {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 100;
      background: rgba(10,12,24,0.8); border: 1px solid rgba(80,100,160,0.2);
      border-radius: 24px; padding: 6px 20px; display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: #8899bb; white-space: nowrap;
    }
    #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #2ecc71; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    #status-text { letter-spacing: 0.5px; }

    /* タイピングインジケーター */
    .typing-indicator { display: flex; gap: 4px; padding: 4px 0; }
    .typing-indicator span { width: 6px; height: 6px; background: #667; border-radius: 50%; animation: typBounce 1.4s infinite; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typBounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* APIキー設定モーダル */
    #apikey-modal {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7); align-items: center; justify-content: center;
    }
    #apikey-modal.open { display: flex; }
    #apikey-box {
      background: rgba(14,16,28,0.97); border: 1px solid rgba(80,100,160,0.35);
      border-radius: 18px; padding: 24px 20px; width: min(360px, calc(100vw - 32px));
      color: #c8d4f0; font-family: 'Segoe UI', 'Meiryo', sans-serif;
    }
    #apikey-box h3 { font-size: 15px; margin-bottom: 10px; color: #e0e8f8; }
    #apikey-box p  { font-size: 12px; color: #8899bb; margin-bottom: 14px; line-height: 1.6; }
    #apikey-input {
      width: 100%; padding: 10px 12px; background: rgba(30,35,60,0.8);
      border: 1px solid rgba(80,100,160,0.3); border-radius: 10px;
      color: #c8d4f0; font-size: 13px; outline: none; margin-bottom: 12px;
    }
    #apikey-save {
      width: 100%; padding: 10px; background: linear-gradient(135deg,#b31e22,#d44);
      border: none; border-radius: 10px; color: #fff; font-size: 14px; cursor: pointer;
    }
    #apikey-btn {
      position: fixed; top: 16px; right: 16px; z-index: 100;
      background: rgba(10,12,24,0.8); border: 1px solid rgba(80,100,160,0.2);
      border-radius: 50%; width: 36px; height: 36px; color: #8899bb;
      font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .apikey-link { color: #6699dd; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="info">DRAG TO ROTATE &#x2022; SCROLL TO ZOOM</div>

  <!-- APIキー設定ボタン -->
  <button id="apikey-btn" title="Gemini APIキー設定">⚙</button>

  <!-- APIキー設定モーダル -->
  <div id="apikey-modal">
    <div id="apikey-box">
      <h3>🔑 Gemini APIキー設定</h3>
      <p>APIキーはこのデバイスのみに保存されます（GitHubには一切アップされません）。<br>
        未取得の場合は <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener" class="apikey-link">こちら</a> で無料取得できます。</p>
      <input id="apikey-input" type="password" placeholder="AIzaSy..." autocomplete="off">
      <button id="apikey-save">保存して閉じる</button>
    </div>
  </div>

  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">RT91 Navi オンライン</span>
  </div>

  <div id="chat-panel">
    <div id="chat-log"></div>
    <div id="chat-input-area">
      <input id="chat-input" type="text" placeholder="RT91に話しかけてみよう..." autocomplete="off">
      <button id="chat-send">▶</button>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ===== シーン初期化 =====
    var scene = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, 0.1, 100);
    var renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setClearColor(0x000008);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    // ===== ライティング =====
    scene.add(new THREE.AmbientLight(0x8899bb, 0.55));
    var keyL = new THREE.DirectionalLight(0xfff4e0, 1.35);
    keyL.position.set(4, 7, 6); keyL.castShadow = true;
    keyL.shadow.mapSize.set(2048, 2048);
    keyL.shadow.camera.near = 0.5; keyL.shadow.camera.far = 20;
    keyL.shadow.camera.left = -3; keyL.shadow.camera.right = 3;
    keyL.shadow.camera.top = 3; keyL.shadow.camera.bottom = -1;
    scene.add(keyL);
    var fillL = new THREE.DirectionalLight(0xaaccff, 0.3); fillL.position.set(-4, 4, 5); scene.add(fillL);
    var rimL = new THREE.DirectionalLight(0x5577aa, 0.25); rimL.position.set(0, 3, -5); scene.add(rimL);
    var botL = new THREE.PointLight(0x334455, 0.2, 6); botL.position.set(0, -0.3, 3); scene.add(botL);

    // ===== 地面（神殿風タイルテクスチャ） =====
    // テクスチャとバンプマップで同一の傷・ひび割れ位置を共有するためデータを事前生成
    var _tileEffects = (function() {
      var S = 512;
      var effects = { scratches: [], cracks: [] };
      // 微細スクラッチ：短く薄い、数多い（石面の細かな摩耗）
      for (var s = 0; s < 16; s++) {
        var ang = Math.random() * Math.PI * 2;
        var len = 6 + Math.random() * 30;
        effects.scratches.push({
          sx: Math.random() * S, sy: Math.random() * S,
          ang: ang, len: len,
          mx: (Math.random() - 0.5) * 4, my: (Math.random() - 0.5) * 4,
          alpha: 0.04 + Math.random() * 0.07,
          lw: 0.2 + Math.random() * 0.3,
          type: 'micro'
        });
      }
      // 通常スクラッチ：中程度の深さと長さ（使い込まれた傷）
      for (var s = 0; s < 8; s++) {
        var ang = Math.random() * Math.PI * 2;
        var len = 35 + Math.random() * 80;
        effects.scratches.push({
          sx: Math.random() * S, sy: Math.random() * S,
          ang: ang, len: len,
          mx: (Math.random() - 0.5) * 10, my: (Math.random() - 0.5) * 10,
          alpha: 0.10 + Math.random() * 0.13,
          lw: 0.5 + Math.random() * 0.6,
          type: 'normal'
        });
      }
      // 深い傷：目立つ溝状の傷、少数（激しい接触の痕）
      for (var s = 0; s < 4; s++) {
        var ang = Math.random() * Math.PI * 2;
        var len = 55 + Math.random() * 130;
        effects.scratches.push({
          sx: Math.random() * S, sy: Math.random() * S,
          ang: ang, len: len,
          mx: (Math.random() - 0.5) * 18, my: (Math.random() - 0.5) * 18,
          alpha: 0.18 + Math.random() * 0.15,
          lw: 0.7 + Math.random() * 0.9,
          type: 'deep'
        });
      }
      // ひび割れ（クラック）データ：放射状に分岐する折れ線
      for (var cr = 0; cr < 3; cr++) {
        var crack = {
          crx: (Math.floor(Math.random() * 4) + 0.2 + Math.random() * 0.6) * (S / 4),
          cry: (Math.floor(Math.random() * 4) + 0.2 + Math.random() * 0.6) * (S / 4),
          branches: []
        };
        var branchCount = 3 + Math.floor(Math.random() * 3);
        for (var b = 0; b < branchCount; b++) {
          var bAng = (b / branchCount) * Math.PI * 2 + (Math.random() - 0.5) * 0.8;
          var segs = 6 + Math.floor(Math.random() * 5);
          var totalLen = 30 + Math.random() * 60;
          var segLen = totalLen / segs;
          var pts = [{ x: crack.crx, y: crack.cry }];
          var px = crack.crx, py = crack.cry;
          for (var bs = 0; bs < segs; bs++) {
            bAng += (Math.random() - 0.5) * 0.40;
            px += Math.cos(bAng) * segLen;
            py += Math.sin(bAng) * segLen;
            pts.push({ x: px, y: py });
            // 途中にサブブランチを追加（確率50%）
            if (bs >= 1 && bs <= segs - 2 && Math.random() > 0.50) {
              var sbAng = bAng + (Math.random() > 0.5 ? 1 : -1) * (0.4 + Math.random() * 0.6);
              var sbSegs = 2 + Math.floor(Math.random() * 3);
              var sbSegLen = segLen * (0.4 + Math.random() * 0.5);
              var sbPts = [{ x: px, y: py }];
              var spx = px, spy = py;
              for (var ss = 0; ss < sbSegs; ss++) {
                sbAng += (Math.random() - 0.5) * 0.35;
                spx += Math.cos(sbAng) * sbSegLen;
                spy += Math.sin(sbAng) * sbSegLen;
                sbPts.push({ x: spx, y: spy });
              }
              crack.branches.push({
                points: sbPts,
                alpha: 0.08 + Math.random() * 0.10,
                lw: 0.3 + Math.random() * 0.4
              });
            }
          }
          crack.branches.push({ points: pts, alpha: 0.16 + Math.random() * 0.16, lw: 0.7 + Math.random() * 1.0 });
        }
        effects.cracks.push(crack);
      }
      return effects;
    })();

    var tileTex = (function() {
      var S = 512, cv = document.createElement('canvas');
      cv.width = cv.height = S;
      var cx = cv.getContext('2d');
      // 大理石風ベース（温かみのあるクリーム〜アイボリー）
      var baseGrd = cx.createLinearGradient(0, 0, S, S);
      baseGrd.addColorStop(0, '#d6cfc4');
      baseGrd.addColorStop(0.5, '#e2dbd0');
      baseGrd.addColorStop(1, '#cec6ba');
      cx.fillStyle = baseGrd;
      cx.fillRect(0, 0, S, S);
      // 大理石の脈模様
      for (var v = 0; v < 18; v++) {
        cx.beginPath();
        var vx = Math.random() * S, vy = Math.random() * S;
        cx.moveTo(vx, vy);
        for (var seg = 0; seg < 6; seg++) {
          vx += (Math.random() - 0.5) * 120;
          vy += (Math.random() - 0.5) * 120;
          cx.lineTo(vx, vy);
        }
        var vAlpha = 0.03 + Math.random() * 0.06;
        cx.strokeStyle = Math.random() > 0.5
          ? 'rgba(160,140,120,' + vAlpha + ')'
          : 'rgba(180,170,155,' + vAlpha + ')';
        cx.lineWidth = 0.5 + Math.random() * 2;
        cx.stroke();
      }
      // タイルグリッド（正方形タイル、目地あり）
      var tileCount = 4, tileSize = S / tileCount, groutW = 3;
      // 目地（溝）を描画
      cx.fillStyle = '#8a8070';
      for (var gi = 0; gi <= tileCount; gi++) {
        cx.fillRect(gi * tileSize - groutW / 2, 0, groutW, S);
        cx.fillRect(0, gi * tileSize - groutW / 2, S, groutW);
      }
      // 各タイルに微妙な色差と光沢グラデーション
      for (var tr = 0; tr < tileCount; tr++) {
        for (var tc = 0; tc < tileCount; tc++) {
          var tx = tc * tileSize + groutW / 2;
          var ty = tr * tileSize + groutW / 2;
          var tw = tileSize - groutW;
          var th = tileSize - groutW;
          // タイルごとの微妙な色ばらつき
          var hueShift = Math.floor(Math.random() * 8) - 4;
          var br = 200 + hueShift + Math.floor(Math.random() * 15);
          var bg = 190 + hueShift + Math.floor(Math.random() * 12);
          var bb = 175 + hueShift + Math.floor(Math.random() * 10);
          cx.fillStyle = 'rgba(' + br + ',' + bg + ',' + bb + ',0.25)';
          cx.fillRect(tx, ty, tw, th);
          // エッジベベル（光沢ハイライト上・左）
          var bevelGrdT = cx.createLinearGradient(tx, ty, tx, ty + 8);
          bevelGrdT.addColorStop(0, 'rgba(255,252,245,0.18)');
          bevelGrdT.addColorStop(1, 'rgba(255,252,245,0)');
          cx.fillStyle = bevelGrdT;
          cx.fillRect(tx, ty, tw, 8);
          var bevelGrdL = cx.createLinearGradient(tx, ty, tx + 8, ty);
          bevelGrdL.addColorStop(0, 'rgba(255,252,245,0.12)');
          bevelGrdL.addColorStop(1, 'rgba(255,252,245,0)');
          cx.fillStyle = bevelGrdL;
          cx.fillRect(tx, ty, 8, th);
          // エッジシャドウ（下・右）
          var bevelGrdB = cx.createLinearGradient(tx, ty + th - 6, tx, ty + th);
          bevelGrdB.addColorStop(0, 'rgba(80,70,55,0)');
          bevelGrdB.addColorStop(1, 'rgba(80,70,55,0.12)');
          cx.fillStyle = bevelGrdB;
          cx.fillRect(tx, ty + th - 6, tw, 6);
          var bevelGrdR = cx.createLinearGradient(tx + tw - 6, ty, tx + tw, ty);
          bevelGrdR.addColorStop(0, 'rgba(80,70,55,0)');
          bevelGrdR.addColorStop(1, 'rgba(80,70,55,0.08)');
          cx.fillStyle = bevelGrdR;
          cx.fillRect(tx + tw - 6, ty, 6, th);
          // 微細なノイズ（石の質感）
          for (var ni = 0; ni < 60; ni++) {
            var nx = tx + Math.random() * tw, ny = ty + Math.random() * th;
            cx.fillStyle = 'rgba(' + (Math.random() > 0.5 ? '240,235,225' : '150,140,125') + ',' + (0.02 + Math.random() * 0.05) + ')';
            cx.fillRect(nx, ny, 1 + Math.random(), 1 + Math.random());
          }
          // 装飾パターン（中心に控えめなダイヤモンド模様）
          if ((tr + tc) % 2 === 0) {
            var centerX = tx + tw / 2, centerY = ty + th / 2, dSize = tw * 0.18;
            cx.beginPath();
            cx.moveTo(centerX, centerY - dSize);
            cx.lineTo(centerX + dSize, centerY);
            cx.lineTo(centerX, centerY + dSize);
            cx.lineTo(centerX - dSize, centerY);
            cx.closePath();
            cx.strokeStyle = 'rgba(170,155,130,0.12)';
            cx.lineWidth = 1;
            cx.stroke();
          }
        }
      }
      // 傷（スクラッチ）を追加：深さに応じた溝＋ハイライトの二重線で立体感を表現
      // 光源は左上を想定：傷の右下側が暗い溝、左上側が明るいリム
      cx.lineCap = 'round';
      _tileEffects.scratches.forEach(function(sc) {
        var perpX = -Math.sin(sc.ang), perpY = Math.cos(sc.ang);
        var ex = sc.sx + Math.cos(sc.ang) * sc.len;
        var ey = sc.sy + Math.sin(sc.ang) * sc.len;
        var cpx = sc.sx + Math.cos(sc.ang) * sc.len * 0.5 + sc.mx;
        var cpy = sc.sy + Math.sin(sc.ang) * sc.len * 0.5 + sc.my;
        if (sc.type === 'deep' || sc.type === 'normal') {
          var off = sc.type === 'deep' ? 1.0 : 0.7;
          // 暗い溝（メインの傷）
          cx.beginPath();
          cx.moveTo(sc.sx + perpX * off * 0.3, sc.sy + perpY * off * 0.3);
          cx.quadraticCurveTo(cpx + perpX * off * 0.3, cpy + perpY * off * 0.3, ex + perpX * off * 0.3, ey + perpY * off * 0.3);
          cx.strokeStyle = 'rgba(70,58,42,' + sc.alpha + ')';
          cx.lineWidth = sc.lw;
          cx.stroke();
          // 明るいリム（溝の反対側のエッジが光を受けて白く光る）
          cx.beginPath();
          cx.moveTo(sc.sx - perpX * off, sc.sy - perpY * off);
          cx.quadraticCurveTo(cpx - perpX * off, cpy - perpY * off, ex - perpX * off, ey - perpY * off);
          cx.strokeStyle = 'rgba(245,238,225,' + (sc.alpha * 0.55) + ')';
          cx.lineWidth = sc.lw * 0.55;
          cx.stroke();
        } else {
          // micro: 薄い単一線
          cx.beginPath();
          cx.moveTo(sc.sx, sc.sy);
          cx.quadraticCurveTo(cpx, cpy, ex, ey);
          cx.strokeStyle = 'rgba(90,80,65,' + sc.alpha + ')';
          cx.lineWidth = sc.lw;
          cx.stroke();
        }
      });
      // ひび割れ（クラック）を追加：放射状に分岐した折れ線でひびを表現
      _tileEffects.cracks.forEach(function(crack) {
        crack.branches.forEach(function(branch) {
          cx.beginPath();
          cx.moveTo(branch.points[0].x, branch.points[0].y);
          for (var i = 1; i < branch.points.length; i++) {
            cx.lineTo(branch.points[i].x, branch.points[i].y);
          }
          cx.strokeStyle = 'rgba(55,44,30,' + branch.alpha + ')';
          cx.lineWidth = branch.lw;
          cx.stroke();
        });
      });
      var tex = new THREE.CanvasTexture(cv);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(3, 3);
      return tex;
    })();

    var tileBump = (function() {
      var S = 512, cv = document.createElement('canvas');
      cv.width = cv.height = S;
      var cx = cv.getContext('2d');
      var tileCount = 4, tileSize = S / tileCount, groutW = 3;
      // タイル面は明るく平坦、目地は暗く凹み
      cx.fillStyle = '#b0b0b0';
      cx.fillRect(0, 0, S, S);
      // 目地の凹み
      cx.fillStyle = '#404040';
      for (var gi = 0; gi <= tileCount; gi++) {

        var ey = sc.sy + Math.sin(sc.ang) * sc.len;

        var cpy = sc.sy + Math.sin(sc.ang) * sc.len * 0.5 + sc.my;

      function makeCloudMat(opacity) {

      function buildCumulus(lat, lon, scale) {

    cvs.addEventListener('mousemove', function(e){ if(!isDrag)return; tRY+=(e.clientX-pM.x)*0.007; tRX+=(e.clientY-pM.y)*0.004; tRX=Math.max(-0.5,Math.min(0.7,tRX)); pM={x:e.clientX,y:e.clientY}; });

    cvs.addEventListener('touchmove', function(e){ if(!isDrag)return; e.preventDefault(); tRY+=(e.touches[0].clientX-pM.x)*0.007; tRX+=(e.touches[0].clientY-pM.y)*0.004; tRX=Math.max(-0.5,Math.min(0.7,tRX)); pM={x:e.touches[0].clientX,y:e.touches[0].clientY}; },{passive:false});

    function getBaseCamDist() {
      var aspect = innerWidth / innerHeight;

    // ===== iOS キーボード対応: visualViewport でチャットパネルを追従 =====
    var chatPanel = document.getElementById('chat-panel');
    function onViewportResize() {

      var offsetBottom = (window.innerHeight - vv.height - vv.offsetTop);

    var aP = 0;

    // ===== ワンダリング（移動）状態 =====
    var wTarget = { x: 0, z: 0 };
    var wNextTime = Date.now() + 1500;
    var wSpeed = 0.02;

    // ===== ドームのキョロキョロ状態 =====
    var domeTargetY = 0, domeTargetX = 0;
    var domeNextTime = Date.now() + 800;

    // ===== カメラ追従 =====
    var camLookX = 0, camLookZ = 0;

    function animate() {
      requestAnimationFrame(animate);
      aP += 0.01;
      var now = Date.now();

      // --- ワンダリング目標更新 ---
      if (now > wNextTime) {
        wTarget.x = (Math.random() - 0.5) * 3.0;
        wTarget.z = (Math.random() - 0.5) * 1.8;
        wNextTime = now + 2000 + Math.random() * 4500;
        wSpeed = 0.012 + Math.random() * 0.028;
      }

      var dx = wTarget.x - droid.position.x;
      var dz = wTarget.z - droid.position.z;
      var dist = Math.sqrt(dx * dx + dz * dz);
      var movingFast = dist > 0.06;
      droid.position.x += dx * wSpeed;
      droid.position.z += dz * wSpeed;

      // 話しかけられた時はカメラ方向、移動中は移動方向にボディを向ける
      if (droidFacing && now < droidFacingEnd) {
        var toCamX = camera.position.x - droid.position.x;
        var toCamZ = camera.position.z - droid.position.z;
        var targetBodyY = Math.atan2(toCamX, toCamZ);
        var curY = droid.rotation.y;
        var diff = targetBodyY - curY;
        while (diff >  Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        droid.rotation.y += diff * 0.07;
      } else if (movingFast) {
        var targetBodyY = Math.atan2(dx, dz);
        var curY = droid.rotation.y;
        var diff = targetBodyY - curY;
        while (diff >  Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        droid.rotation.y += diff * 0.07;
      }

      // 移動時に前傾き
      var tiltX = movingFast ? -0.30 - dist * 0.07 : -0.30;
      droid.rotation.x += (tiltX - droid.rotation.x) * 0.06;

      // --- カメラ ---
      rY += (tRY - rY) * 0.08;
      rX += (tRX - rX) * 0.08;
      cD += (tCD - cD) * 0.08;
      camera.position.x = Math.sin(rY) * cD;
      camera.position.z = Math.cos(rY) * cD;
      camera.position.y = 1.6 + rX * 3.5;
      // ドロイドをカメラが追いかける
      camLookX += (droid.position.x - camLookX) * 0.04;
      camLookZ += (droid.position.z - camLookZ) * 0.04;
      camera.lookAt(camLookX, 0.95, camLookZ);

      // --- ドームのキョロキョロ ---
      if (now > domeNextTime) {
        domeTargetY = (Math.random() - 0.5) * 1.4;
        domeTargetX = (Math.random() - 0.35) * 0.35;
        domeNextTime = now + 600 + Math.random() * 1800;
      }
      var dm = droid.getObjectByName('dome');
      if (dm) {
        if (droidFacing && now < droidFacingEnd) {
          if (droidReacting && now < droidReactEnd) {
            // 反応アニメーション（頭振り）
            dm.rotation.y = Math.sin(aP * 4) * 0.6;
            dm.rotation.x = Math.sin(aP * 3) * 0.2;
          } else {
            droidReacting = false;
            // ボディがカメラを向いているので頭も正面（y=0）に向ける
            dm.rotation.y += (0 - dm.rotation.y) * 0.05;
            dm.rotation.x += (0.05 - dm.rotation.x) * 0.05;
          }
        } else {
          droidFacing = false;
          droidReacting = false;
          dm.rotation.y += (domeTargetY - dm.rotation.y) * 0.035;
          dm.rotation.x += (domeTargetX - dm.rotation.x) * 0.035;
        }
      }

      // --- ボディの自然な揺れ ---
      var bd = droid.getObjectByName('main-body');
      if (bd) {
        bd.rotation.z = Math.sin(aP * 0.9) * 0.018;
        var bounceAmt = movingFast ? Math.abs(Math.sin(aP * 3.5)) * 0.03 : 0;
        bd.position.y = 1.25 + Math.sin(aP * 1.4) * 0.012 + bounceAmt;
      }

      // --- 足の動き（移動中は交互に揺れ） ---
      var legL = droid.getObjectByName('leg-L');
      var legR = droid.getObjectByName('leg-R');
      if (legL && legR) {
        var legSwing = movingFast ? 0.15 : 0.0;
        legL.rotation.x += (Math.sin(aP * 3.5) * legSwing - legL.rotation.x) * 0.15;
        legR.rotation.x += (Math.sin(aP * 3.5 + Math.PI) * legSwing - legR.rotation.x) * 0.15;
      }

      // --- 星空のゆっくり回転 ---
      if (stars) { stars.rotation.y += 0.00015; stars.rotation.x += 0.00006; }

      // --- 地球の自転 ---
      if (earthMesh) {
        earthMesh.rotation.y += 0.0008;
      }

      // 雲は earthMesh の子要素として自転に連動する（大気圏が地球と共に回転）

      renderer.render(scene, camera);
    }

    // --- 天気API (Open-Meteo / 無料・APIキー不要) ---
    var weatherCache = null;
    var weatherCacheTime = 0;

    function getWeather() {
      return new Promise(function(resolve, reject) {
        // 30分キャッシュ
        if (weatherCache && Date.now() - weatherCacheTime < 1800000) {
          resolve(weatherCache);
          return;
        }
        // 位置情報取得 -> 天気取得
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(function(pos) {
            fetchWeather(pos.coords.latitude, pos.coords.longitude).then(resolve).catch(reject);
          }, function() {
            // 位置取得失敗時は東京をデフォルト
            fetchWeather(35.6762, 139.6503).then(resolve).catch(reject);
          }, { timeout: 5000 });
        } else {
          fetchWeather(35.6762, 139.6503).then(resolve).catch(reject);
        }
      });
    }

    function fetchWeather(lat, lon) {
      var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon +
        '&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m' +
        '&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=Asia%2FTokyo&forecast_days=1';
      return fetch(url).then(function(r) { return r.json(); }).then(function(data) {
        weatherCache = data;
        weatherCacheTime = Date.now();
        return data;
      });
    }

    function weatherCodeToText(code) {
      var map = {
        0: ['☀️', '快晴'], 1: ['🌤', '晴れ時々曇り'], 2: ['⛅', '曇り'], 3: ['☁️', '曇り'],
        45: ['🌫️', '霧'], 48: ['🌫️', '霧氷'],
        51: ['🌦', '小雨'], 53: ['🌧', '雨'], 55: ['🌧', '強雨'],
        61: ['🌧', '小雨'], 63: ['🌧', '雨'], 65: ['🌧', '大雨'],
        71: ['❄️', '小雪'], 73: ['❄️', '雪'], 75: ['❄️', '大雪'],
        80: ['🌦', 'にわか雨'], 81: ['🌧', '雨'], 82: ['⛈', '豪雨'],
        95: ['⛈', '雷雨'], 96: ['⛈', '雷雨(雹)'], 99: ['⛈', '雷雨(雹)']
      };
      return map[code] || ['🌤', '不明'];
    }

    function formatWeatherResponse(data) {
      var c = data.current;
      var d = data.daily;
      var wc = weatherCodeToText(c.weather_code);
      var html = '<div>今の天気をお伝えします！</div>';
      html += '<div class="weather-card">';
      html += '<div class="wc-main"><span style="font-size:36px">' + wc[0] + '</span><br><span class="wc-desc">' + wc[1] + '</span></div>';
      html += '<div class="wc-main"><span class="wc-temp">' + c.temperature_2m + '°C</span></div>';
      html += '<div class="wc-item">体感: <span class="wc-val">' + c.apparent_temperature + '°C</span></div>';
      html += '<div class="wc-item">湿度: <span class="wc-val">' + c.relative_humidity_2m + '%</span></div>';
      html += '<div class="wc-item">風速: <span class="wc-val">' + c.wind_speed_10m + ' km/h</span></div>';
      if (d) {
        html += '<div class="wc-item">最高/最低: <span class="wc-val">' + d.temperature_2m_max[0] + '/' + d.temperature_2m_min[0] + '°C</span></div>';
      }
      html += '</div>';

      // アドバイス
      var temp = c.temperature_2m;
      if (temp >= 30) html += '<div style="margin-top:6px; font-size:12px; color:#e8a040;">☁ 熱中症に注意！水分補給を忘れずに！</div>';
      else if (temp <= 5) html += '<div style="margin-top:6px; font-size:12px; color:#70b8ff;">❄ 寒いです！暖かくしてお出かけください。</div>';
      if (c.weather_code >= 51) html += '<div style="margin-top:4px; font-size:12px; color:#7799cc;">\u2602 傷をお忘れなく！</div>';

      return html;
    }

    // --- 時刻・日付 ---
    function getTimeString() {
      var now = new Date();
      var h = now.getHours(), m = now.getMinutes();
      var period = h < 12 ? '午前' : '午後';
      var h12 = h % 12 || 12;
      return period + ' ' + h12 + ':' + (m < 10 ? '0' : '') + m;
    }
    function getDateString() {
      var now = new Date();
      var days = ['日', '月', '火', '水', '木', '金', '土'];
      return now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日(' + days[now.getDay()] + ')';
    }

    // --- 会話ロジック ---
    function processMessage(text) {
      var lower = text.toLowerCase();
      triggerDroidReaction();

      // 天気
      if (/天気|気温|温度|降水|雨|晴|曇|雪|予報|weather/i.test(lower)) {
        showTyping();
        getWeather().then(function(data) {
          removeTyping();
          addMsg(formatWeatherResponse(data), 'bot', true);
        }).catch(function() {
          removeTyping();
          addMsg('ピーガガー・ピー（天気情報の取得に失敗しました…）', 'bot');
        });
        return;
      }

      // 時刻
      if (/時刻|今何時|時間|time/i.test(lower)) {
        addMsg('現在の時刻は ' + getTimeString() + ' です！', 'bot');
        return;
      }

      // 日付
      if (/今日|日付|何日|曜日|date/i.test(lower)) {
        addMsg('今日は ' + getDateString() + ' です！', 'bot');
        return;
      }

      // 挨拶
      if (/こんにちは|こんばんは|おはよう|やあ|hello|hi|おつかれ|ただいま/i.test(lower)) {
        var greetings = [
          'ピーピー！こんにちは！今日は何かお手伝いしましょうか？',
          'ビープビープ！元気ですか？',
          'ピッピッ！RT91ナビ、准備完了です！'
        ];
        addMsg(greetings[Math.floor(Math.random()*greetings.length)], 'bot');
        return;
      }

      // 自己紹介
      if (/誰|名前|何者|自己紹介|who are you/i.test(lower)) {
        addMsg('ピーガガー！私はRT91ナビ、あなた専属のアストロメク・ナビゲータードロイドです！天気・時刻はもちろん、スターウォーズのことならどんなことでも詳しいですよ！', 'bot');
        return;
      }

      // できること
      if (/できること|機能|ヘルプ|help|何が|what can/i.test(lower)) {
        addMsg('ピーピー！私にできること：\n\n☀️ 「天気を教えて」— 現在地の天気\n⏰ 「今何時？」— 現在時刻\n📅 「今日は何日？」— 日付・曜日\n⚔️ 「ダース・ベイダーって誰？」— スターウォーズ百科事典\n😄 何でも話しかけてください！', 'bot');
        return;
      }

      // お礼
      if (/ありがとう|サンキュー|thanks|thank/i.test(lower)) {
        addMsg('ピーピー！どういたしまして！いつでも声をかけてくださいね！', 'bot');
        return;

      // カイロ・レン/ベン・ソロ
      if (/カイロ.?レン|kylo.?ren|ベン.?ソロ|ben.?solo/i.test(lower)) {
        return 'ビービービー！カイロ・レン（本名ベン・ソロ）はハン・ソロとレイアの息子！ダーク・サイドとライト・サイドの間で葛藤し続ける複雑なキャラクター。父ハンを自ら手にかけてしまったシーンは衝撃でした。最終的にはレイとの絆でライト・サイドに戻り（ベン・ソロとして覚醒）、スカイウォーカーの夜明けでパルパティーンに立ち向かいました！';
      }
      // レイ（Kylo/Ben等の後に判定してレイアと区別）
      if (/\brey\b/i.test(lower) || /レイ(?!ア)/.test(lower)) {
        return 'ピービービー！レイはエピソード7〜9の主人公！ジャクーの砂漠で廃品回収をして生きていた謎の少女が、強大なフォースの使い手と判明！実はパルパティーンの孫という衝撃の出自を持ちます。ルークにトレーニングを受け、最終的にパルパティーンを倒す伝説のジェダイに！「レイ・スカイウォーカー」と名乗り新たな時代を開きました！';
      }
      // ストームトルーパー
      if (/ストームトルーパー|stormtrooper|白い兵士|帝国兵/i.test(lower)) {
        return 'ビービービー！ストームトルーパーは銀河帝国の基本歩兵！全員が同じ白い鎧を着た顔のない兵士たちで、圧倒的な数で迫ってきます。クローン戦争後はクローン技術から一般人の徴兵に変わりました。「主人公には全然当たらない」とネタにされているのも事実（笑）。ファースト・オーダーでは子供のころから洗脳されて育てられました！';
      }
      // ジャバ・ザ・ハット
      if (/ジャバ|jabba/i.test(lower)) {
        return 'ビービー！ジャバ・ザ・ハットはタトゥイーンを拠点にする犯罪組織のボス！ナメクジのような巨大な体と欲深い性格が特徴。ハン・ソロを炭素凍結して飾り物にしたことでルークたちの救出作戦が始まりました。エピソード6でレイア姫に首を絞められて最期を迎えたのは衝撃的でしたね！';
      }
      // 銀河帝国
      if (/銀河帝国|galactic.?empire|帝国/i.test(lower)) {
        return 'ビービービー！銀河帝国はパルパティーン（ダース・シディアス）が銀河共和国を乗っ取って作り上げた独裁政権！ダース・ベイダーが右腕として全銀河を恐怖で支配しました。象徴はインペリアル・スター・デストロイヤー、デス・スター、そして帝国軍マーク。「帝国の逆襲」のタイトル通り、最強の悪役帝国として映画史に刻まれています！';
      }
      // 反乱同盟
      if (/反乱同盟|rebel.?alliance|反乱軍|レジスタンス|resistance/i.test(lower)) {
        return 'ピービービー！反乱同盟はパルパティーンの銀河帝国に立ち向かった自由の戦士たち！レイア姫が中心人物で、ルーク、ハン、ランド・カルリジアンなどが活躍しました。ヤヴィンの戦いでデス・スターを破壊し、エンドアの戦いで帝国を倒しました。「May the Force be with you（フォースと共にあらんことを）」は反乱同盟の合言葉でもあります！';
      }
      // 名言・名セリフ
      if (/名言|名セリフ|quote|セリフ|言葉/i.test(lower)) {
        var quotes = [
          '「May the Force be with you.（フォースと共にあらんことを）」— スターウォーズの究極の祝福の言葉！',
          '「Do or do not. There is no try.（やるかやらないか。やってみるはない）」— ヨーダ',
          '「I am your father.（俺はお前の父親だ）」— ダース・ベイダー from エピソード5',
          '「I know.（知ってる）」— ハン・ソロ（レイアの「愛してる」への返答）',
          '「Help me, Obi-Wan Kenobi. You\'re my only hope.（助けてオビ=ワン・ケノービ、あなただけが頼りです）」— レイア姫のホログラム',
          '「This is the Way.（これがマンダロリアンの流儀だ）」— ディン・ジャリン'
        ];
        return 'ピービービー！スターウォーズの名言といえば…\n\n' + quotes[Math.floor(Math.random() * quotes.length)] + '\n\nどのキャラクターの名言か聞いてみてください！';
      }
      // 一般的なスターウォーズの質問
      return 'ピーピーピーピー！スターウォーズについてなら任せてください！1977年にジョージ・ルーカスが生み出した宇宙叙事詩で、「フォース」「ジェダイ」「シス」「銀河帝国」「反乱同盟」などの概念が全世界に革命をもたらしました！エピソード1〜9の本編、ローグ・ワン、ハン・ソロ、マンダロリアンなど作品は多岐にわたります。特定のキャラクターや惑星について聞いてみてください！';
    }

    // --- Gemini API ---
    var geminiHistory = [];

    function callGemini(userText) {
      var key = localStorage.getItem('rt91_gemini_key') || '';
      if (!key) {
        addMsg('ピピー！Gemini APIキーが設定されていません。右上の ⚙ から設定してください。', 'bot');
        return;
      }
      geminiHistory.push({ role: 'user', parts: [{ text: userText }] });

      showTyping();
      var body = {
        system_instruction: {
          parts: [{ text: 'あなたはRT91というアストロメク・ナビゲータードロイドです。R2-D2のようなキャラクターで、日本語で短く親切に答えてください。必要に応じて「ピーピー！」「ビープ！」などの効果音を文頭に入れてください。天気や時刻などを聞かれたら自然に「天気」「時刻」などのキーワードを含む返答をしてください。回答はできるだけ短く（3〜5文以内）。' }]
        },
        contents: geminiHistory
      };
      fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=' + encodeURIComponent(key), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      }).then(function(r) {
        if (!r.ok) return r.json().then(function(e){ throw new Error('HTTP ' + r.status + ': ' + (e.error && e.error.message || '')); });
        return r.json();
      }).then(function(data) {
        removeTyping();
        var reply = data.candidates && data.candidates[0] && data.candidates[0].content &&
          data.candidates[0].content.parts && data.candidates[0].content.parts[0].text;
        if (!reply) throw new Error('no reply');
        geminiHistory.push({ role: 'model', parts: [{ text: reply }] });
        // 履歴が長くなりすぎないよう20ターンに制限
        if (geminiHistory.length > 40) geminiHistory = geminiHistory.slice(-40);
        addMsg(reply, 'bot');
      }).catch(function(e) {
        removeTyping();
        addMsg('ピーガガー！通信エラーが発生しました（' + e.message + '）。APIキーを確認してください。', 'bot');
      });
    }

    // --- イベント ---
    function onSend() {
      var text = chatInput.value.trim();
      if (!text) return;
      addMsg(text, 'user');
      chatInput.value = '';
      setTimeout(function() { processMessage(text); }, 400);
    }
    chatSend.addEventListener('click', onSend);
    chatInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); onSend(); }
    });

    // APIキー設定モーダル
    var apikeyModal = document.getElementById('apikey-modal');
    var apikeyInput = document.getElementById('apikey-input');
    document.getElementById('apikey-btn').addEventListener('click', function() {
      apikeyInput.value = localStorage.getItem('rt91_gemini_key') || '';
      apikeyModal.classList.add('open');
    });
    document.getElementById('apikey-save').addEventListener('click', function() {
      var k = apikeyInput.value.trim();
      if (k) localStorage.setItem('rt91_gemini_key', k);
      apikeyModal.classList.remove('open');
      addMsg('ピピー！APIキーを保存しました。これで自由に会話できます！', 'bot');
    });
    apikeyModal.addEventListener('click', function(e) {
      if (e.target === apikeyModal) apikeyModal.classList.remove('open');
    });

    // 起動時の挨拶
    setTimeout(function() {
      addMsg('ピーピー！RT91ナビです。今日は何をお手伝いしましょうか？\n「天気」「時刻」のほか、スターウォーズについて何でも聞いてください！', 'bot');
    }, 1000);

    // Service Worker登録
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(function(reg) {
        console.log('SW registered:', reg.scope);
      }).catch(function(err) {
        console.log('SW registration failed:', err);
      });
    }
  </script>
</body>
</html>
