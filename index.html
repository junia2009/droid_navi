<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#b31e22">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RT91 Navi">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>RT91 Navi - ナビゲータードロイド</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000008; min-height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #c { position: fixed; inset: 0; }
    #info { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); color: rgba(180,190,210,0.45); font-size: 11px; letter-spacing: 2px; pointer-events: none; z-index: 10; display:none; }

    /* チャットUI */
    #chat-panel {
      position: fixed; bottom: 20px; right: 20px; width: min(380px, calc(100vw - 24px)); z-index: 100;
      font-family: 'Segoe UI', 'Meiryo', sans-serif;
    }
    #chat-log {
      max-height: min(320px, 36vh); overflow-y: auto; padding: 12px;
      background: rgba(10,12,24,0.85); border-radius: 16px 16px 0 0;
      border: 1px solid rgba(80,100,160,0.25); border-bottom: none;
      scrollbar-width: thin; scrollbar-color: rgba(80,100,160,0.3) transparent;
    }
    .msg { margin-bottom: 10px; display: flex; gap: 8px; align-items: flex-start; animation: msgIn 0.3s ease; }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: bold;
    }
    .msg.bot .msg-avatar { background: linear-gradient(135deg, #b31e22, #d44); color: #fff; }
    .msg.user .msg-avatar { background: linear-gradient(135deg, #1a3cb5, #3366dd); color: #fff; }
    .msg-bubble {
      padding: 8px 14px; border-radius: 12px; max-width: 280px;
      font-size: 13.5px; line-height: 1.55; word-break: break-word;
    }
    .msg.bot .msg-bubble { background: rgba(40,50,80,0.7); color: #d0d8e8; border: 1px solid rgba(80,100,160,0.2); }
    .msg.user .msg-bubble { background: rgba(26,60,181,0.35); color: #c8d4f0; border: 1px solid rgba(60,100,200,0.25); }
    .msg-bubble .weather-card {
      background: rgba(20,30,60,0.5); border-radius: 10px; padding: 10px; margin-top: 6px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px;
    }
    .weather-card .wc-main { grid-column: 1 / -1; text-align: center; margin-bottom: 4px; }
    .weather-card .wc-temp { font-size: 28px; font-weight: bold; color: #e8ecf4; }
    .weather-card .wc-desc { font-size: 12px; color: #8899bb; }
    .weather-card .wc-item { font-size: 12px; color: #99aabb; }
    .weather-card .wc-val { font-weight: 600; color: #c0ccdd; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    #chat-input-area {
      display: flex; gap: 0;
      background: rgba(14,16,28,0.92); border-radius: 0 0 16px 16px;
      border: 1px solid rgba(80,100,160,0.25); border-top: 1px solid rgba(80,100,160,0.1);
      overflow: hidden;
    }
    #chat-input {
      flex: 1; padding: 12px 16px; background: transparent; border: none;
      color: #c8d4f0; font-size: 16px; outline: none;
      font-family: 'Segoe UI', 'Meiryo', sans-serif;
      /* iOS Safari: 16px未満だとフォーカス時に自動ズームされるため16px固定 */
    }
    #chat-input::placeholder { color: rgba(130,150,190,0.5); }
    #chat-send {
      padding: 10px 18px; background: linear-gradient(135deg, #b31e22, #d44);
      border: none; color: #fff; cursor: pointer; font-size: 14px;
      transition: background 0.2s;
    }
    #chat-send:hover { background: linear-gradient(135deg, #d44, #e55); }

    /* ステータスバー */
    #status-bar {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 100;
      background: rgba(10,12,24,0.8); border: 1px solid rgba(80,100,160,0.2);
      border-radius: 24px; padding: 6px 20px; display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: #8899bb; white-space: nowrap;
    }
    #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #2ecc71; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    #status-text { letter-spacing: 0.5px; }

    /* タイピングインジケーター */
    .typing-indicator { display: flex; gap: 4px; padding: 4px 0; }
    .typing-indicator span { width: 6px; height: 6px; background: #667; border-radius: 50%; animation: typBounce 1.4s infinite; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typBounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* APIキー設定モーダル */
    #apikey-modal {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7); align-items: center; justify-content: center;
    }
    #apikey-modal.open { display: flex; }
    #apikey-box {
      background: rgba(14,16,28,0.97); border: 1px solid rgba(80,100,160,0.35);
      border-radius: 18px; padding: 24px 20px; width: min(360px, calc(100vw - 32px));
      color: #c8d4f0; font-family: 'Segoe UI', 'Meiryo', sans-serif;
    }
    #apikey-box h3 { font-size: 15px; margin-bottom: 10px; color: #e0e8f8; }
    #apikey-box p  { font-size: 12px; color: #8899bb; margin-bottom: 14px; line-height: 1.6; }
    #apikey-input {
      width: 100%; padding: 10px 12px; background: rgba(30,35,60,0.8);
      border: 1px solid rgba(80,100,160,0.3); border-radius: 10px;
      color: #c8d4f0; font-size: 13px; outline: none; margin-bottom: 12px;
    }
    #apikey-save {
      width: 100%; padding: 10px; background: linear-gradient(135deg,#b31e22,#d44);
      border: none; border-radius: 10px; color: #fff; font-size: 14px; cursor: pointer;
    }
    #apikey-btn {
      position: fixed; top: 16px; right: 16px; z-index: 100;
      background: rgba(10,12,24,0.8); border: 1px solid rgba(80,100,160,0.2);
      border-radius: 50%; width: 36px; height: 36px; color: #8899bb;
      font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .apikey-link { color: #6699dd; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="info">DRAG TO ROTATE &#x2022; SCROLL TO ZOOM</div>

  <!-- APIキー設定ボタン -->
  <button id="apikey-btn" title="Gemini APIキー設定">⚙</button>

  <!-- APIキー設定モーダル -->
  <div id="apikey-modal">
    <div id="apikey-box">
      <h3>🔑 Gemini APIキー設定</h3>
      <p>APIキーはこのデバイスのみに保存されます（GitHubには一切アップされません）。<br>
        未取得の場合は <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener" class="apikey-link">こちら</a> で無料取得できます。</p>
      <input id="apikey-input" type="password" placeholder="AIzaSy..." autocomplete="off">
      <button id="apikey-save">保存して閉じる</button>
    </div>
  </div>

  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">RT91 Navi オンライン</span>
  </div>

  <div id="chat-panel">
    <div id="chat-log"></div>
    <div id="chat-input-area">
      <input id="chat-input" type="text" placeholder="RT91に話しかけてみよう..." autocomplete="off">
      <button id="chat-send">▶</button>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ===== シーン初期化 =====
    var scene = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, 0.1, 100);
    var renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setClearColor(0x000008);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    // ===== ライティング =====
    scene.add(new THREE.AmbientLight(0x8899bb, 0.55));
    var keyL = new THREE.DirectionalLight(0xfff4e0, 1.35);
    keyL.position.set(4, 7, 6); keyL.castShadow = true;
    keyL.shadow.mapSize.set(2048, 2048);
    keyL.shadow.camera.near = 0.5; keyL.shadow.camera.far = 20;
    keyL.shadow.camera.left = -3; keyL.shadow.camera.right = 3;
    keyL.shadow.camera.top = 3; keyL.shadow.camera.bottom = -1;
    scene.add(keyL);
    var fillL = new THREE.DirectionalLight(0xaaccff, 0.3); fillL.position.set(-4, 4, 5); scene.add(fillL);
    var rimL = new THREE.DirectionalLight(0x5577aa, 0.25); rimL.position.set(0, 3, -5); scene.add(rimL);
    var botL = new THREE.PointLight(0x334455, 0.2, 6); botL.position.set(0, -0.3, 3); scene.add(botL);

    // ===== 地面（神殿風タイルテクスチャ） =====
    // テクスチャとバンプマップで同一の傷・ひび割れ位置を共有するためデータを事前生成
    var _tileEffects = (function() {
      var S = 512;
      var effects = { scratches: [], cracks: [] };
      // 微細スクラッチ：短く薄い、数多い（石面の細かな摩耗）
      for (var s = 0; s < 16; s++) {
        var ang = Math.random() * Math.PI * 2;
        var len = 6 + Math.random() * 30;
        effects.scratches.push({
          sx: Math.random() * S, sy: Math.random() * S,
          ang: ang, len: len,
          mx: (Math.random() - 0.5) * 4, my: (Math.random() - 0.5) * 4,
          alpha: 0.04 + Math.random() * 0.07,
          lw: 0.2 + Math.random() * 0.3,
          type: 'micro'
        });
      }
      // 通常スクラッチ：中程度の深さと長さ（使い込まれた傷）
      for (var s = 0; s < 8; s++) {
        var ang = Math.random() * Math.PI * 2;
        var len = 35 + Math.random() * 80;
        effects.scratches.push({
          sx: Math.random() * S, sy: Math.random() * S,
          ang: ang, len: len,
          mx: (Math.random() - 0.5) * 10, my: (Math.random() - 0.5) * 10,
          alpha: 0.10 + Math.random() * 0.13,
          lw: 0.5 + Math.random() * 0.6,
          type: 'normal'
        });
      }
      // 深い傷：目立つ溝状の傷、少数（激しい接触の痕）
      for (var s = 0; s < 4; s++) {
        var ang = Math.random() * Math.PI * 2;
        var len = 55 + Math.random() * 130;
        effects.scratches.push({
          sx: Math.random() * S, sy: Math.random() * S,
          ang: ang, len: len,
          mx: (Math.random() - 0.5) * 18, my: (Math.random() - 0.5) * 18,
          alpha: 0.18 + Math.random() * 0.15,
          lw: 0.7 + Math.random() * 0.9,
          type: 'deep'
        });
      }
      // ひび割れ（クラック）データ：放射状に分岐する折れ線
      for (var cr = 0; cr < 3; cr++) {
        var crack = {
          crx: (Math.floor(Math.random() * 4) + 0.2 + Math.random() * 0.6) * (S / 4),
          cry: (Math.floor(Math.random() * 4) + 0.2 + Math.random() * 0.6) * (S / 4),
          branches: []
        };
        var branchCount = 3 + Math.floor(Math.random() * 3);
        for (var b = 0; b < branchCount; b++) {
          var bAng = (b / branchCount) * Math.PI * 2 + (Math.random() - 0.5) * 0.8;
          var segs = 6 + Math.floor(Math.random() * 5);
          var totalLen = 30 + Math.random() * 60;
          var segLen = totalLen / segs;
          var pts = [{ x: crack.crx, y: crack.cry }];
          var px = crack.crx, py = crack.cry;
          for (var bs = 0; bs < segs; bs++) {
            bAng += (Math.random() - 0.5) * 0.40;
            px += Math.cos(bAng) * segLen;
            py += Math.sin(bAng) * segLen;
            pts.push({ x: px, y: py });
            // 途中にサブブランチを追加（確率50%）
            if (bs >= 1 && bs <= segs - 2 && Math.random() > 0.50) {
              var sbAng = bAng + (Math.random() > 0.5 ? 1 : -1) * (0.4 + Math.random() * 0.6);
              var sbSegs = 2 + Math.floor(Math.random() * 3);
              var sbSegLen = segLen * (0.4 + Math.random() * 0.5);
              var sbPts = [{ x: px, y: py }];
              var spx = px, spy = py;
              for (var ss = 0; ss < sbSegs; ss++) {
                sbAng += (Math.random() - 0.5) * 0.35;
                spx += Math.cos(sbAng) * sbSegLen;
                spy += Math.sin(sbAng) * sbSegLen;
                sbPts.push({ x: spx, y: spy });
              }
              crack.branches.push({
                points: sbPts,
                alpha: 0.08 + Math.random() * 0.10,
                lw: 0.3 + Math.random() * 0.4
              });
            }
          }
          crack.branches.push({ points: pts, alpha: 0.16 + Math.random() * 0.16, lw: 0.7 + Math.random() * 1.0 });
        }
        effects.cracks.push(crack);
      }
      return effects;
    })();

    var tileTex = (function() {
      var S = 512, cv = document.createElement('canvas');
      cv.width = cv.height = S;
      var cx = cv.getContext('2d');
      // 大理石風ベース（温かみのあるクリーム〜アイボリー）
      var baseGrd = cx.createLinearGradient(0, 0, S, S);
      baseGrd.addColorStop(0, '#d6cfc4');
      baseGrd.addColorStop(0.5, '#e2dbd0');
      baseGrd.addColorStop(1, '#cec6ba');
      cx.fillStyle = baseGrd;
      cx.fillRect(0, 0, S, S);
      // 大理石の脈模様
      for (var v = 0; v < 18; v++) {
        cx.beginPath();
        var vx = Math.random() * S, vy = Math.random() * S;
        cx.moveTo(vx, vy);
        for (var seg = 0; seg < 6; seg++) {
          vx += (Math.random() - 0.5) * 120;
          vy += (Math.random() - 0.5) * 120;
          cx.lineTo(vx, vy);
        }
        var vAlpha = 0.03 + Math.random() * 0.06;
        cx.strokeStyle = Math.random() > 0.5
          ? 'rgba(160,140,120,' + vAlpha + ')'
          : 'rgba(180,170,155,' + vAlpha + ')';
        cx.lineWidth = 0.5 + Math.random() * 2;
        cx.stroke();
      }
      // タイルグリッド（正方形タイル、目地あり）
      var tileCount = 4, tileSize = S / tileCount, groutW = 3;
      // 目地（溝）を描画
      cx.fillStyle = '#8a8070';
      for (var gi = 0; gi <= tileCount; gi++) {
        cx.fillRect(gi * tileSize - groutW / 2, 0, groutW, S);
        cx.fillRect(0, gi * tileSize - groutW / 2, S, groutW);
      }
      // 各タイルに微妙な色差と光沢グラデーション
      for (var tr = 0; tr < tileCount; tr++) {
        for (var tc = 0; tc < tileCount; tc++) {
          var tx = tc * tileSize + groutW / 2;
          var ty = tr * tileSize + groutW / 2;
          var tw = tileSize - groutW;
          var th = tileSize - groutW;
          // タイルごとの微妙な色ばらつき
          var hueShift = Math.floor(Math.random() * 8) - 4;
          var br = 200 + hueShift + Math.floor(Math.random() * 15);
          var bg = 190 + hueShift + Math.floor(Math.random() * 12);
          var bb = 175 + hueShift + Math.floor(Math.random() * 10);
          cx.fillStyle = 'rgba(' + br + ',' + bg + ',' + bb + ',0.25)';
          cx.fillRect(tx, ty, tw, th);
          // エッジベベル（光沢ハイライト上・左）
          var bevelGrdT = cx.createLinearGradient(tx, ty, tx, ty + 8);
          bevelGrdT.addColorStop(0, 'rgba(255,252,245,0.18)');
          bevelGrdT.addColorStop(1, 'rgba(255,252,245,0)');
          cx.fillStyle = bevelGrdT;
          cx.fillRect(tx, ty, tw, 8);
          var bevelGrdL = cx.createLinearGradient(tx, ty, tx + 8, ty);
          bevelGrdL.addColorStop(0, 'rgba(255,252,245,0.12)');
          bevelGrdL.addColorStop(1, 'rgba(255,252,245,0)');
          cx.fillStyle = bevelGrdL;
          cx.fillRect(tx, ty, 8, th);
          // エッジシャドウ（下・右）
          var bevelGrdB = cx.createLinearGradient(tx, ty + th - 6, tx, ty + th);
          bevelGrdB.addColorStop(0, 'rgba(80,70,55,0)');
          bevelGrdB.addColorStop(1, 'rgba(80,70,55,0.12)');
          cx.fillStyle = bevelGrdB;
          cx.fillRect(tx, ty + th - 6, tw, 6);
          var bevelGrdR = cx.createLinearGradient(tx + tw - 6, ty, tx + tw, ty);
          bevelGrdR.addColorStop(0, 'rgba(80,70,55,0)');
          bevelGrdR.addColorStop(1, 'rgba(80,70,55,0.08)');
          cx.fillStyle = bevelGrdR;
          cx.fillRect(tx + tw - 6, ty, 6, th);
          // 微細なノイズ（石の質感）
          for (var ni = 0; ni < 60; ni++) {
            var nx = tx + Math.random() * tw, ny = ty + Math.random() * th;
            cx.fillStyle = 'rgba(' + (Math.random() > 0.5 ? '240,235,225' : '150,140,125') + ',' + (0.02 + Math.random() * 0.05) + ')';
            cx.fillRect(nx, ny, 1 + Math.random(), 1 + Math.random());
          }
          // 装飾パターン（中心に控えめなダイヤモンド模様）
          if ((tr + tc) % 2 === 0) {
            var centerX = tx + tw / 2, centerY = ty + th / 2, dSize = tw * 0.18;
            cx.beginPath();
            cx.moveTo(centerX, centerY - dSize);
            cx.lineTo(centerX + dSize, centerY);
            cx.lineTo(centerX, centerY + dSize);
            cx.lineTo(centerX - dSize, centerY);
            cx.closePath();
            cx.strokeStyle = 'rgba(170,155,130,0.12)';
            cx.lineWidth = 1;
            cx.stroke();
          }
        }
      }
      // 傷（スクラッチ）を追加：深さに応じた溝＋ハイライトの二重線で立体感を表現
      // 光源は左上を想定：傷の右下側が暗い溝、左上側が明るいリム
      cx.lineCap = 'round';
      _tileEffects.scratches.forEach(function(sc) {
        var perpX = -Math.sin(sc.ang), perpY = Math.cos(sc.ang);
        var ex = sc.sx + Math.cos(sc.ang) * sc.len;
        var ey = sc.sy + Math.sin(sc.ang) * sc.len;
        var cpx = sc.sx + Math.cos(sc.ang) * sc.len * 0.5 + sc.mx;
        var cpy = sc.sy + Math.sin(sc.ang) * sc.len * 0.5 + sc.my;
        if (sc.type === 'deep' || sc.type === 'normal') {
          var off = sc.type === 'deep' ? 1.0 : 0.7;
          // 暗い溝（メインの傷）
          cx.beginPath();
          cx.moveTo(sc.sx + perpX * off * 0.3, sc.sy + perpY * off * 0.3);
          cx.quadraticCurveTo(cpx + perpX * off * 0.3, cpy + perpY * off * 0.3, ex + perpX * off * 0.3, ey + perpY * off * 0.3);
          cx.strokeStyle = 'rgba(70,58,42,' + sc.alpha + ')';
          cx.lineWidth = sc.lw;
          cx.stroke();
          // 明るいリム（溝の反対側のエッジが光を受けて白く光る）
          cx.beginPath();
          cx.moveTo(sc.sx - perpX * off, sc.sy - perpY * off);
          cx.quadraticCurveTo(cpx - perpX * off, cpy - perpY * off, ex - perpX * off, ey - perpY * off);
          cx.strokeStyle = 'rgba(245,238,225,' + (sc.alpha * 0.55) + ')';
          cx.lineWidth = sc.lw * 0.55;
          cx.stroke();
        } else {
          // micro: 薄い単一線
          cx.beginPath();
          cx.moveTo(sc.sx, sc.sy);
          cx.quadraticCurveTo(cpx, cpy, ex, ey);
          cx.strokeStyle = 'rgba(90,80,65,' + sc.alpha + ')';
          cx.lineWidth = sc.lw;
          cx.stroke();
        }
      });
      // ひび割れ（クラック）を追加：放射状に分岐した折れ線でひびを表現
      _tileEffects.cracks.forEach(function(crack) {
        crack.branches.forEach(function(branch) {
          cx.beginPath();
          cx.moveTo(branch.points[0].x, branch.points[0].y);
          for (var i = 1; i < branch.points.length; i++) {
            cx.lineTo(branch.points[i].x, branch.points[i].y);
          }
          cx.strokeStyle = 'rgba(55,44,30,' + branch.alpha + ')';
          cx.lineWidth = branch.lw;
          cx.stroke();
        });
      });
      var tex = new THREE.CanvasTexture(cv);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(3, 3);
      return tex;
    })();

    var tileBump = (function() {
      var S = 512, cv = document.createElement('canvas');
      cv.width = cv.height = S;
      var cx = cv.getContext('2d');
      var tileCount = 4, tileSize = S / tileCount, groutW = 3;
      // タイル面は明るく平坦、目地は暗く凹み
      cx.fillStyle = '#b0b0b0';
      cx.fillRect(0, 0, S, S);
      // 目地の凹み
      cx.fillStyle = '#404040';
      for (var gi = 0; gi <= tileCount; gi++) {

        var ey = sc.sy + Math.sin(sc.ang) * sc.len;

        var cpy = sc.sy + Math.sin(sc.ang) * sc.len * 0.5 + sc.my;

      function makeCloudMat(opacity) {
        return new THREE.MeshStandardMaterial({
          color: 0xf2f5ff,
          roughness: 1.0,
          metalness: 0.0,
          transparent: true,
          opacity: opacity,
          depthWrite: false,
        });
      }

      // グループを球面上に配置し、Y軸を外向き法線に揃える
      function placeOnSphere(grp, lat, lon, r) {
        var pos = spherePos(lat, lon, r);
        grp.position.copy(pos);
        grp.quaternion.setFromUnitVectors(
          new THREE.Vector3(0, 1, 0),
          pos.clone().normalize()
        );
        return grp;
      }

      // ──────────────────────────────────────
      //  層雲 (Stratus) — 広範囲に広がる平坦な雲層
      //  前線帯や海洋上で幅 500〜2000 km に広がる
      //  複数の扁平な楕円体を重ねて不均一な雲層を表現
      // ──────────────────────────────────────
      function buildStratus(lat, lon, scale) {
        var grp = new THREE.Group();
        // メイン雲層: 非常に扁平で横に広い楕円体
        var mainSheet = new THREE.Mesh(
          new THREE.SphereGeometry(0.50 * scale, 18, 8),
          makeCloudMat(0.45)
        );
        mainSheet.scale.set(2.2, 0.12, 1.8);
        grp.add(mainSheet);
        // 雲層の不均一性: 複数のパッチを重ねる
        var patches = [
          { x: 0.25, z: 0.15, sx: 1.4, sz: 1.2, o: 0.40 },
          { x:-0.20, z:-0.10, sx: 1.6, sz: 1.0, o: 0.38 },
          { x: 0.10, z:-0.25, sx: 1.3, sz: 1.5, o: 0.35 },
          { x:-0.15, z: 0.20, sx: 1.1, sz: 1.3, o: 0.42 },
          { x: 0.30, z:-0.20, sx: 1.0, sz: 0.9, o: 0.30 },
          { x:-0.30, z: 0.05, sx: 0.9, sz: 1.1, o: 0.32 },
        ];
        patches.forEach(function(p) {
          var patch = new THREE.Mesh(
            new THREE.SphereGeometry(0.30 * scale, 12, 6),
            makeCloudMat(p.o)
          );
          patch.scale.set(p.sx, 0.15, p.sz);
          patch.position.set(p.x * scale, 0.01 * scale, p.z * scale);
          grp.add(patch);
        });
        return placeOnSphere(grp, lat, lon, CR);
      }

      // ──────────────────────────────────────
      //  積雲クラスター (Cumulus Cluster) — 対流性の雲群
      //  個々の積雲が集まり数百 km のクラスターを形成
      //  熱帯収束帯や夏季の大陸上で発達
      // ──────────────────────────────────────
      function buildCumulus(lat, lon, scale) {
        var grp = new THREE.Group();
        // 雲底層（LCL面）
        var baseSph = new THREE.Mesh(
          new THREE.SphereGeometry(0.40 * scale, 14, 10),
          makeCloudMat(0.55)
        );
        baseSph.scale.set(1.8, 0.25, 1.5);
        grp.add(baseSph);
        // 対流セル群
        var cells = [
          { x: 0.00, y: 0.18, z: 0.00, r: 0.35, o: 0.80 },
          { x: 0.00, y: 0.38, z: 0.00, r: 0.26, o: 0.74 },
          { x: 0.00, y: 0.52, z: 0.00, r: 0.18, o: 0.65 },
          { x: 0.24, y: 0.14, z: 0.10, r: 0.26, o: 0.72 },
          { x:-0.22, y: 0.13, z: 0.12, r: 0.25, o: 0.70 },
          { x: 0.14, y: 0.30, z:-0.18, r: 0.22, o: 0.68 },
          { x:-0.16, y: 0.28, z: 0.20, r: 0.21, o: 0.66 },
          { x: 0.26, y: 0.26, z:-0.12, r: 0.20, o: 0.64 },
          { x:-0.24, y: 0.24, z:-0.10, r: 0.19, o: 0.62 },
          { x: 0.10, y: 0.44, z: 0.14, r: 0.16, o: 0.56 },
          { x:-0.12, y: 0.42, z:-0.10, r: 0.15, o: 0.54 },
          { x: 0.20, y: 0.36, z: 0.18, r: 0.14, o: 0.50 },
          { x:-0.18, y: 0.34, z:-0.16, r: 0.13, o: 0.48 },
        ];
        cells.forEach(function(c) {
          var mesh = new THREE.Mesh(
            new THREE.SphereGeometry(c.r * scale, 9, 7),
            makeCloudMat(c.o)
          );
          mesh.position.set(c.x * scale, c.y * scale, c.z * scale);
          grp.add(mesh);
        });
        return placeOnSphere(grp, lat, lon, CR);
      }

      // ──────────────────────────────────────
      //  台風・熱帯低気圧 (Tropical Cyclone)
      //  スパイラル状の雲バンドが渦を巻く
      //  中心に台風の目（eye）、周囲にアイウォール、
      //  外側にスパイラルレインバンドが広がる
      //  北半球: 反時計回り / 南半球: 時計回り
      // ──────────────────────────────────────
      function buildCyclone(lat, lon, scale, clockwise) {
        var grp = new THREE.Group();
        var dir = clockwise ? -1 : 1;
        // アイウォール（目の壁雲 — 最も激しい上昇気流域）
        // 目の半径を中心に密な雲のリングを形成
        var eyeRadius = 0.08 * scale;
        var wallCount = 10;
        for (var i = 0; i < wallCount; i++) {
          var angle = (i / wallCount) * Math.PI * 2;
          var wr = eyeRadius + 0.02 * scale;
          var wallCell = new THREE.Mesh(
            new THREE.SphereGeometry(0.08 * scale, 8, 6),
            makeCloudMat(0.82)
          );
          wallCell.scale.set(1.4, 0.5, 1.4);
          wallCell.position.set(
            Math.cos(angle) * wr,
            0.02 * scale,
            Math.sin(angle) * wr
          );
          grp.add(wallCell);
        }
        // スパイラルレインバンド（3本の腕）
        var arms = 3;
        var bandsPerArm = 8;
        for (var a = 0; a < arms; a++) {
          var armOffset = (a / arms) * Math.PI * 2;
          for (var b = 0; b < bandsPerArm; b++) {
            var t = (b + 1) / bandsPerArm; // 0→1（中心→外側）
            var spiralAngle = armOffset + dir * t * Math.PI * 1.8;
            var spiralR = (0.15 + t * 0.50) * scale;
            var bandSize = (0.10 + t * 0.06) * scale;
            var bandMesh = new THREE.Mesh(
              new THREE.SphereGeometry(bandSize, 8, 6),
              makeCloudMat(0.60 - t * 0.20)
            );
            bandMesh.scale.set(1.6, 0.20, 0.8);
            bandMesh.position.set(
              Math.cos(spiralAngle) * spiralR,
              (0.01 - t * 0.005) * scale,
              Math.sin(spiralAngle) * spiralR
            );
            // バンドを渦の接線方向に回転
            bandMesh.rotation.y = -spiralAngle + Math.PI * 0.5;
            grp.add(bandMesh);
          }
        }
        // 上層の巻雲アウトフロー（台風上層で広がる傘状の雲）
        var outflow = new THREE.Mesh(
          new THREE.SphereGeometry(0.55 * scale, 14, 8),
          makeCloudMat(0.20)
        );
        outflow.scale.set(1.3, 0.06, 1.3);
        outflow.position.y = 0.05 * scale;
        grp.add(outflow);
        return placeOnSphere(grp, lat, lon, CR);
      }

      // ──────────────────────────────────────
      //  巻雲 (Cirrus) — 高高度の薄い氷晶雲
      //  ジェット気流に沿って細長く延びる繊維状の雲
      //  幅は狭いが長さは 100〜500 km に達する
      // ──────────────────────────────────────
      function buildCirrus(lat, lon, scale) {
        var grp = new THREE.Group();
        // 複数の細長い繊維を配置
        var fibers = [
          { x: 0.0, z: 0.0, rot: 0.0, len: 1.0 },
          { x: 0.12, z: 0.06, rot: 0.2, len: 0.8 },
          { x:-0.08, z:-0.05, rot:-0.15, len: 0.9 },
          { x: 0.05, z: 0.12, rot: 0.35, len: 0.7 },
          { x:-0.10, z: 0.08, rot:-0.1, len: 0.6 },
        ];
        fibers.forEach(function(f) {
          var fiber = new THREE.Mesh(
            new THREE.SphereGeometry(0.20 * scale * f.len, 10, 4),
            makeCloudMat(0.22)
          );
          fiber.scale.set(2.5, 0.04, 0.3);
          fiber.position.set(f.x * scale, 0, f.z * scale);
          fiber.rotation.y = f.rot;
          grp.add(fiber);
        });
        return placeOnSphere(grp, lat, lon, CR_HIGH);
      }

      // ═══════════════════════════════════════
      //  雲の配置定義
      //  type: 'stratus'  — 層雲（広範囲の雲層）
      //        'cumulus'  — 積雲クラスター（対流雲群）
      //        'cyclone'  — 台風・熱帯低気圧
      //        'cirrus'   — 巻雲（高層の薄い雲）
      //  s: サイズ係数
      //  cw: true=時計回り（南半球）, 省略/false=反時計回り（北半球）
      //      コリオリ力により北半球は反時計回り、南半球は時計回りに渦を巻く
      // ═══════════════════════════════════════

      // フォールバック用の静的雲定義
      var staticCloudDefs = [
        { type: 'stratus', lat:  50, lon: -30, s: 0.70 },
        { type: 'stratus', lat:  55, lon:  15, s: 0.60 },
        { type: 'stratus', lat:  45, lon: 160, s: 0.65 },
        { type: 'stratus', lat: -45, lon:  50, s: 0.55 },
        { type: 'stratus', lat: -50, lon: -70, s: 0.60 },
        { type: 'stratus', lat: -48, lon: 150, s: 0.50 },
        { type: 'stratus', lat:  35, lon:-125, s: 0.55 },

        { type: 'cumulus', lat:   8, lon:  30, s: 0.55 },
        { type: 'cumulus', lat:  -5, lon: -60, s: 0.60 },
        { type: 'cumulus', lat:   5, lon: 110, s: 0.50 },
        { type: 'cumulus', lat:  -8, lon: 130, s: 0.45 },
        { type: 'cumulus', lat:  10, lon:  80, s: 0.45 },
        { type: 'cumulus', lat:   3, lon: -30, s: 0.40 },
        { type: 'cumulus', lat:  12, lon:-100, s: 0.40 },
        { type: 'cumulus', lat:  -3, lon:  25, s: 0.35 },
        { type: 'cumulus', lat:  30, lon: 120, s: 0.40 },
        { type: 'cumulus', lat:  25, lon: -80, s: 0.35 },
        { type: 'cyclone', lat:  18, lon: 135, s: 0.55 },
        { type: 'cyclone', lat:  22, lon: -65, s: 0.45 },
        { type: 'cyclone', lat: -15, lon:  65, s: 0.40, cw: true },
        { type: 'cirrus', lat:  38, lon: -60, s: 0.50 },
        { type: 'cirrus', lat:  42, lon:  30, s: 0.45 },
        { type: 'cirrus', lat:  35, lon: 140, s: 0.40 },
        { type: 'cirrus', lat: -35, lon: 175, s: 0.35 },
        { type: 'cirrus', lat:  48, lon: -110, s: 0.40 },
        { type: 'cirrus', lat: -30, lon: -50, s: 0.35 },
      ];

      // 雲メッシュを追跡（動的に入れ替えるため）
      var cloudMeshes = [];

      function addCloudFromDef(cd) {
        var mesh;
        switch (cd.type) {
          case 'stratus':  mesh = buildStratus(cd.lat, cd.lon, cd.s); break;
          case 'cumulus':  mesh = buildCumulus(cd.lat, cd.lon, cd.s); break;
          case 'cyclone':  mesh = buildCyclone(cd.lat, cd.lon, cd.s, !!cd.cw); break;
          case 'cirrus':   mesh = buildCirrus(cd.lat, cd.lon, cd.s); break;
        }
        if (mesh) {
          cloudMeshes.push(mesh);
          earthMesh.add(mesh);
        }
      }

      function clearClouds() {
        cloudMeshes.forEach(function(m) { earthMesh.remove(m); });
        cloudMeshes = [];
      }

      function renderClouds(defs) {
        clearClouds();
        defs.forEach(addCloudFromDef);
      }

      // ─── 天気コード → 雲タイプ変換 ───
      // Open-Meteo WMO Weather interpretation codes:
      //   0: 快晴, 1: 晴れ, 2: 一部曇り, 3: 曇り
      //   45,48: 霧
      //   51-55: 霧雨, 61-65: 雨, 71-75: 雪
      //   80-82: にわか雨, 95-99: 雷雨
      function weatherCodeToCloudDef(lat, lon, code, cloudCover) {
        // 雲量に基づくサイズ係数 (0〜100% → 0.30〜0.70)
        var sizeFactor = 0.30 + (cloudCover / 100) * 0.40;

        if (code === 0) return null;  // 快晴: 雲なし
        if (code === 1) return { type: 'cirrus', lat: lat, lon: lon, s: sizeFactor * 0.7 };
        if (code === 2) return { type: 'stratus', lat: lat, lon: lon, s: sizeFactor * 0.8 };
        if (code === 3) return { type: 'stratus', lat: lat, lon: lon, s: sizeFactor };
        if (code === 45 || code === 48) return { type: 'stratus', lat: lat, lon: lon, s: sizeFactor * 0.9 };
        if (code >= 51 && code <= 55) return { type: 'stratus', lat: lat, lon: lon, s: sizeFactor };
        if (code >= 61 && code <= 65) return { type: 'cumulus', lat: lat, lon: lon, s: sizeFactor };
        if (code >= 71 && code <= 75) return { type: 'stratus', lat: lat, lon: lon, s: sizeFactor };
        if (code >= 80 && code <= 82) return { type: 'cumulus', lat: lat, lon: lon, s: sizeFactor };
        // 雷雨 (95-99): 台風/サイクロン型
        if (code >= 95) return { type: 'cyclone', lat: lat, lon: lon, s: sizeFactor, cw: lat < 0 };
        return { type: 'cirrus', lat: lat, lon: lon, s: sizeFactor * 0.7 };
      }

      // ─── 実天気データ取得用の観測地点（世界30箇所）───
      // 主要都市 + 海洋上のポイントで地球全体をカバー
      var globalObsPoints = [
        { lat: 35.68, lon: 139.69 },   // 東京
        { lat: 51.51, lon:  -0.13 },   // ロンドン
        { lat: 40.71, lon: -74.01 },   // ニューヨーク
        { lat:-33.87, lon: 151.21 },   // シドニー
        { lat: 55.76, lon:  37.62 },   // モスクワ
        { lat:-23.55, lon: -46.63 },   // サンパウロ
        { lat: 28.61, lon:  77.21 },   // デリー
        { lat: 39.90, lon: 116.40 },   // 北京
        { lat: 30.04, lon:  31.24 },   // カイロ
        { lat: -1.29, lon:  36.82 },   // ナイロビ
        { lat: 48.86, lon:   2.35 },   // パリ
        { lat:-34.60, lon: -58.38 },   // ブエノスアイレス
        { lat: 13.76, lon: 100.50 },   // バンコク
        { lat:  1.35, lon: 103.82 },   // シンガポール
        { lat: 19.43, lon: -99.13 },   // メキシコシティ
        { lat: -6.21, lon: 106.85 },   // ジャカルタ
        { lat: 37.57, lon: 126.98 },   // ソウル
        { lat: 64.15, lon: -21.94 },   // レイキャビク
        { lat: 49.28, lon:-123.12 },   // バンクーバー
        { lat: 33.87, lon:-118.24 },   // ロサンゼルス
        { lat:-41.29, lon: 174.78 },   // ウェリントン
        // 海洋上の観測ポイント（雲カバレッジ向上）
        { lat: 50.0, lon: -30.0 },     // 北大西洋
        { lat:-45.0, lon:  50.0 },     // 南インド洋
        { lat:  5.0, lon: -160.0 },    // 中部太平洋
        { lat:-50.0, lon: -70.0 },     // 南太平洋
        { lat: 45.0, lon: 160.0 },     // 北太平洋
        { lat: -8.0, lon: 130.0 },     // パプアニューギニア沖
        { lat: 10.0, lon:  80.0 },     // ベンガル湾
        { lat: 60.0, lon:  70.0 },     // シベリア
        { lat:-20.0, lon: -85.0 },     // ペルー沖
      ];

      // ─── 実天気データ取得 → 雲を動的に生成 ───
      function fetchGlobalWeatherAndUpdateClouds() {
        var lats = globalObsPoints.map(function(p) { return p.lat; }).join(',');
        var lons = globalObsPoints.map(function(p) { return p.lon; }).join(',');
        var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lats +
          '&longitude=' + lons +
          '&current=weather_code,cloud_cover&timezone=auto';

        fetch(url).then(function(r) { return r.json(); }).then(function(results) {
          // Open-Meteo は複数地点の場合、配列で返す
          if (!Array.isArray(results)) results = [results];
          var newDefs = [];
          results.forEach(function(data, i) {
            if (!data || !data.current) return;
            var code = data.current.weather_code;
            var cover = data.current.cloud_cover != null ? data.current.cloud_cover : 50;
            var pt = globalObsPoints[i];
            var def = weatherCodeToCloudDef(pt.lat, pt.lon, code, cover);
            if (def) newDefs.push(def);
          });

          if (newDefs.length > 0) {
            renderClouds(newDefs);
          }
          // 取得失敗 or 雲が0個の場合は静的雲のまま維持
        }).catch(function(e) {
          // フェッチ失敗時は静的雲のまま（何もしない）
          console.warn('Global weather fetch failed, using static clouds:', e);
        });
      }

      // 初期表示: 静的な雲をまず描画（即時表示用）
      renderClouds(staticCloudDefs);

      // ページロード時に実天気データを取得して雲を更新
      fetchGlobalWeatherAndUpdateClouds();
    })();

    // =====================================================
    //  X-Wing & TIE Fighter 宇宙戦闘
    // =====================================================
    var battleFighters = [];

    // --- X-Wing 構築 ---
    function buildXWing() {
      var xw = new THREE.Group();
      var bodyMat = new THREE.MeshStandardMaterial({ color: 0xd8d8d8, roughness: 0.4, metalness: 0.15 });
      var redMat = new THREE.MeshStandardMaterial({ color: 0xcc2222, roughness: 0.4, metalness: 0.1 });
      var dkMat = new THREE.MeshStandardMaterial({ color: 0x333340, roughness: 0.3, metalness: 0.5 });
      var engineMat = new THREE.MeshStandardMaterial({ color: 0x4488ff, emissive: 0x2244aa, emissiveIntensity: 0.8, roughness: 0.2, metalness: 0.3 });

      // 胴体（先細りの長いノーズ）
      var nose = new THREE.Mesh(cy(0.025, 0.06, 0.5, 8), bodyMat);
      nose.rotation.x = Math.PI / 2;
      nose.position.z = 0.35;
      xw.add(nose);
      var fuselage = new THREE.Mesh(bx(0.12, 0.09, 0.45), bodyMat);
      fuselage.position.z = -0.1;
      xw.add(fuselage);

      // コクピット
      var cockpitMat = new THREE.MeshStandardMaterial({ color: 0x1a2a44, roughness: 0.1, metalness: 0.7 });
      var cockpit = new THREE.Mesh(sp(0.05, 8, 6), cockpitMat);
      cockpit.scale.set(1, 0.7, 1.4);
      cockpit.position.set(0, 0.06, 0.05);
      xw.add(cockpit);

      // R2ユニット
      var r2 = new THREE.Mesh(cy(0.03, 0.03, 0.05, 8), new THREE.MeshStandardMaterial({ color: 0x2244bb, roughness: 0.4 }));
      r2.position.set(0, 0.07, -0.12);
      xw.add(r2);
      var r2Head = new THREE.Mesh(sp(0.03, 6, 4), bodyMat);
      r2Head.scale.y = 0.6;
      r2Head.position.set(0, 0.10, -0.12);
      xw.add(r2Head);

      // S-フォイル（4枚の翼 — X字に展開）
      var wingGeo = bx(0.55, 0.012, 0.25);
      var wingPositions = [
        { y: 0.04, rotZ: 0.18 },    // 右上
        { y: 0.04, rotZ: -0.18 },   // 右下
        { y: -0.04, rotZ: 0.18 },   // 左上（反転）
        { y: -0.04, rotZ: -0.18 },  // 左下（反転）
      ];
      for (var wi = 0; wi < 4; wi++) {
        var wp = wingPositions[wi];
        var side = wi < 2 ? 1 : -1;
        var wing = new THREE.Mesh(wingGeo, bodyMat);
        wing.position.set(side * 0.3, wp.y, -0.05);
        wing.rotation.z = wp.rotZ * side;
        xw.add(wing);

        // 赤ストライプ
        var stripe = new THREE.Mesh(bx(0.15, 0.014, 0.04), redMat);
        stripe.position.set(side * 0.45, wp.y + Math.sin(wp.rotZ * side) * 0.15, 0.08);
        stripe.rotation.z = wp.rotZ * side;
        xw.add(stripe);

        // 翼端のレーザーキャノン
        var cannon = new THREE.Mesh(cy(0.012, 0.012, 0.2, 6), dkMat);
        cannon.rotation.x = Math.PI / 2;
        cannon.position.set(side * 0.55, wp.y + Math.sin(wp.rotZ * side) * 0.25, 0.06);
        cannon.rotation.z = wp.rotZ * side;
        xw.add(cannon);

        // エンジンノズル
        var eng = new THREE.Mesh(cy(0.022, 0.018, 0.06, 6), engineMat);
        eng.rotation.x = Math.PI / 2;
        eng.position.set(side * 0.25, wp.y + Math.sin(wp.rotZ * side) * -0.05, -0.35);
        eng.rotation.z = wp.rotZ * side;
        xw.add(eng);
      }

      // 胴体赤ストライプ
      var bodyStripe = new THREE.Mesh(bx(0.01, 0.095, 0.44), redMat);
      bodyStripe.position.set(0.065, 0, -0.1);
      xw.add(bodyStripe);

      return xw;
    }

    // --- TIE Fighter 構築 ---
    function buildTIEFighter() {
      var tie = new THREE.Group();
      var panelMat = new THREE.MeshStandardMaterial({ color: 0x445566, roughness: 0.35, metalness: 0.4 });
      var frameMat = new THREE.MeshStandardMaterial({ color: 0x333344, roughness: 0.3, metalness: 0.5 });
      var cockpitMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2a, roughness: 0.15, metalness: 0.6 });
      var windowMat = new THREE.MeshStandardMaterial({ color: 0x112244, roughness: 0.05, metalness: 0.8, emissive: 0x0a1122, emissiveIntensity: 0.3 });

      // 球形コクピット
      var cockpitBall = new THREE.Mesh(sp(0.12, 12, 10), cockpitMat);
      tie.add(cockpitBall);
      // コクピット窓（前面の六角形的なウィンドウ）
      var windowMesh = new THREE.Mesh(sp(0.09, 6, 4), windowMat);
      windowMesh.scale.z = 0.3;
      windowMesh.position.z = 0.1;
      tie.add(windowMesh);

      // 支柱（左右のパイロン）
      for (var si = 0; si < 2; si++) {
        var side = si === 0 ? -1 : 1;
        var strut = new THREE.Mesh(bx(0.18, 0.03, 0.03), frameMat);
        strut.position.set(side * 0.2, 0, 0);
        tie.add(strut);

        // ソーラーパネル（六角形）
        var panelShape = new THREE.Shape();
        var panelR = 0.3;
        for (var hi = 0; hi < 6; hi++) {
          var ha = (hi / 6) * Math.PI * 2 - Math.PI / 6;
          if (hi === 0) panelShape.moveTo(Math.cos(ha) * panelR, Math.sin(ha) * panelR);
          else panelShape.lineTo(Math.cos(ha) * panelR, Math.sin(ha) * panelR);
        }
        panelShape.closePath();
        var panelGeo = new THREE.ShapeGeometry(panelShape);
        var panel = new THREE.Mesh(panelGeo, panelMat);
        panel.rotation.y = side * Math.PI / 2;
        panel.position.set(side * 0.31, 0, 0);
        tie.add(panel);

        // パネルフレーム（十字の支柱）
        var hBar = new THREE.Mesh(bx(0.008, 0.55, 0.012), frameMat);
        hBar.position.set(side * 0.315, 0, 0);
        hBar.rotation.y = side * Math.PI / 2;
        tie.add(hBar);
        var vBar = new THREE.Mesh(bx(0.55, 0.008, 0.012), frameMat);
        vBar.position.set(side * 0.315, 0, 0);
        vBar.rotation.y = side * Math.PI / 2;
        tie.add(vBar);

        // パネル対角フレーム
        var d1 = new THREE.Mesh(bx(0.008, 0.55, 0.012), frameMat);
        d1.rotation.y = side * Math.PI / 2;
        d1.rotation.x = Math.PI / 4;
        d1.position.set(side * 0.315, 0, 0);
        tie.add(d1);
        var d2 = new THREE.Mesh(bx(0.008, 0.55, 0.012), frameMat);
        d2.rotation.y = side * Math.PI / 2;
        d2.rotation.x = -Math.PI / 4;
        d2.position.set(side * 0.315, 0, 0);
        tie.add(d2);
      }

      // レーザーキャノン（下部）
      var laserL = new THREE.Mesh(cy(0.01, 0.01, 0.12, 6), frameMat);
      laserL.rotation.x = Math.PI / 2;
      laserL.position.set(0, -0.08, 0.14);
      tie.add(laserL);

      return tie;
    }

    // --- レーザーボルト生成 ---
    function createLaserBolt(startPos, direction, color) {
      var laserMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.9 });
      var laser = new THREE.Mesh(cy(0.008, 0.008, 0.2, 4), laserMat);
      laser.position.copy(startPos);
      laser.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction.clone().normalize());
      scene.add(laser);
      return {
        mesh: laser,
        dir: direction.clone().normalize(),
        speed: 0.25,
        life: 120,
        age: 0
      };
    }

    // --- 爆発エフェクト生成 ---
    function createExplosion(position) {
      var group = new THREE.Group();
      group.position.copy(position);
      var partCount = 12;
      var parts = [];
      for (var i = 0; i < partCount; i++) {
        var col = Math.random() > 0.4 ? 0xff6622 : (Math.random() > 0.5 ? 0xffaa00 : 0xff2200);
        var pMat = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 1.0 });
        var pMesh = new THREE.Mesh(sp(0.02 + Math.random() * 0.04, 4, 3), pMat);
        var vel = new THREE.Vector3(
          (Math.random() - 0.5) * 0.08,
          (Math.random() - 0.5) * 0.08,
          (Math.random() - 0.5) * 0.08
        );
        group.add(pMesh);
        parts.push({ mesh: pMesh, vel: vel });
      }
      // 中心フラッシュ
      var flashMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 1.0 });
      var flash = new THREE.Mesh(sp(0.1, 6, 4), flashMat);
      group.add(flash);

      scene.add(group);
      return { group: group, parts: parts, flash: flash, life: 40, age: 0 };
    }

    // --- 戦闘アニメーション更新 ---
    function updateBattle(time) {
      var xwings = battleFighters.filter(function(f) { return f.type === 'xwing'; });
      var ties = battleFighters.filter(function(f) { return f.type === 'tie'; });

      battleFighters.forEach(function(f) {
        // リスポーン処理
        if (!f.alive) {
          f.respawnTimer--;
          f.mesh.visible = false;
          if (f.respawnTimer <= 0) {
            f.alive = true;
            f.hp = f.type === 'xwing' ? 3 : 2;
            f.mesh.visible = true;
            f.phase += Math.PI * 0.7; // リスポーン時に位相をずらす
            createExplosion(f.mesh.position.clone()); // リスポーンフラッシュ
          }
          return;
        }

        // 軌道上を飛行
        f.phase += f.orbitSpeed;
        f.verticalPhase += 0.012;
        var px = Math.cos(f.phase) * f.orbitRadius;
        var py = f.orbitHeight + Math.sin(f.verticalPhase) * f.verticalAmp;
        var pz = Math.sin(f.phase) * f.orbitRadius;
        f.mesh.position.set(px, py, pz);

        // 進行方向を向く
        var nextPx = Math.cos(f.phase + 0.05) * f.orbitRadius;
        var nextPy = f.orbitHeight + Math.sin(f.verticalPhase + 0.05) * f.verticalAmp;
        var nextPz = Math.sin(f.phase + 0.05) * f.orbitRadius;
        var forward = new THREE.Vector3(nextPx - px, nextPy - py, nextPz - pz).normalize();

        // lookAt を使って進行方向を向かせる
        var lookTarget = f.mesh.position.clone().add(forward);
        f.mesh.lookAt(lookTarget);

        // バンク角（旋回時にロール）
        f.mesh.rotation.z += Math.sin(f.phase * 2) * f.rollAmp * 0.02;

        // 射撃
        f.fireCooldown--;
        if (f.fireCooldown <= 0) {
          f.fireCooldown = f.fireRate + Math.floor(Math.random() * 20);

          // 敵陣営からターゲットを選択
          var enemies = f.type === 'xwing' ? ties : xwings;
          var aliveEnemies = enemies.filter(function(e) { return e.alive; });
          if (aliveEnemies.length > 0) {
            var target = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)];
            var toTarget = target.mesh.position.clone().sub(f.mesh.position).normalize();

            // レーザー色: X-Wing=赤, TIE=緑
            var laserColor = f.type === 'xwing' ? 0xff2222 : 0x22ff44;
            var bolt = createLaserBolt(f.mesh.position.clone(), toTarget, laserColor);
            bolt.target = target;
            laserBolts.push(bolt);

            // X-Wingは2連射
            if (f.type === 'xwing') {
              var offset = new THREE.Vector3(0.1, 0, 0);
              var bolt2 = createLaserBolt(f.mesh.position.clone().add(offset), toTarget, laserColor);
              bolt2.target = target;
              laserBolts.push(bolt2);
            }
          }
        }
      });

      // レーザーボルト更新
      for (var li = laserBolts.length - 1; li >= 0; li--) {
        var bolt = laserBolts[li];
        bolt.mesh.position.add(bolt.dir.clone().multiplyScalar(bolt.speed));
        bolt.age++;

        // ターゲットとの当たり判定
        if (bolt.target && bolt.target.alive) {
          var dist = bolt.mesh.position.distanceTo(bolt.target.mesh.position);
          if (dist < 0.4) {
            bolt.target.hp--;
            if (bolt.target.hp <= 0) {
              bolt.target.alive = false;
              bolt.target.respawnTimer = 180 + Math.floor(Math.random() * 120); // 3〜5秒後リスポーン
              createExplosion(bolt.target.mesh.position.clone());
            }
            scene.remove(bolt.mesh);
            laserBolts.splice(li, 1);
            continue;
          }
        }

        if (bolt.age > bolt.life) {
          scene.remove(bolt.mesh);
          laserBolts.splice(li, 1);
        }
      }

      // 爆発エフェクト更新
      for (var ei = explosions.length - 1; ei >= 0; ei--) {
        var exp = explosions[ei];
        exp.age++;
        var progress = exp.age / exp.life;
        exp.parts.forEach(function(p) {
          p.mesh.position.add(p.vel);
          p.vel.multiplyScalar(0.95);
          p.mesh.material.opacity = Math.max(0, 1 - progress);
          p.mesh.scale.setScalar(1 + progress * 2);
        });
        exp.flash.material.opacity = Math.max(0, 1 - progress * 3);
        exp.flash.scale.setScalar(1 + progress * 4);
        if (exp.age >= exp.life) {
          scene.remove(exp.group);
          explosions.splice(ei, 1);
        }
      }
    }

    // createExplosion のラッパー（爆発をexplosions配列にも追加）
    var _origCreateExplosion = createExplosion;

    var cvs = document.getElementById('c');

    var cD = 4.8, tCD = 4.8;

    cvs.addEventListener('mousedown', function(e){ isDrag=true; pM={x:e.clientX,y:e.clientY}; });
    cvs.addEventListener('mousemove', function(e){ if(!isDrag)return; tRY+=(e.clientX-pM.x)*0.007; tRX+=(e.clientY-pM.y)*0.004; tRX=Math.max(-0.5,Math.min(0.7,tRX)); pM={x:e.clientX,y:e.clientY}; });
    cvs.addEventListener('mouseup', function(){ isDrag=false; });
    cvs.addEventListener('mouseleave', function(){ isDrag=false; });
    cvs.addEventListener('touchstart', function(e){ if(e.target===cvs){ e.preventDefault(); isDrag=true; pM={x:e.touches[0].clientX,y:e.touches[0].clientY}; } },{passive:false});
    cvs.addEventListener('touchmove', function(e){ if(!isDrag)return; e.preventDefault(); tRY+=(e.touches[0].clientX-pM.x)*0.007; tRX+=(e.touches[0].clientY-pM.y)*0.004; tRX=Math.max(-0.5,Math.min(0.7,tRX)); pM={x:e.touches[0].clientX,y:e.touches[0].clientY}; },{passive:false});

    cvs.addEventListener('wheel', function(e){ e.preventDefault(); tCD+=e.deltaY*0.004; tCD=Math.max(3,Math.min(9,tCD)); },{passive:false});
    function getBaseCamDist() {
      var aspect = innerWidth / innerHeight;
      // 縦画面(portrait)ほどカメラを引いてドロイド全体を収める
      return aspect < 1 ? 4.8 + (1 - aspect) * 2.5 : 4.8;
    }
    window.addEventListener('resize', function(){
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      tCD = getBaseCamDist();
      cD  = tCD;
    });
    // 初期カメラ距離もアスペクト比で設定
    cD = getBaseCamDist(); tCD = cD;

    // ===== iOS キーボード対応: visualViewport でチャットパネルを追従 =====
    var chatPanel = document.getElementById('chat-panel');
    function onViewportResize() {
      var vv = window.visualViewport;
      if (!vv) return;
      // キーボード分だけ bottom をずらして入力欄が隠れないようにする
      var offsetBottom = (window.innerHeight - vv.height - vv.offsetTop);
      chatPanel.style.bottom = (Math.max(offsetBottom, 0) + 20) + 'px';
      chatPanel.style.transform = 'translateY(0)';
    }
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', onViewportResize);
      window.visualViewport.addEventListener('scroll', onViewportResize);
    }

    var aP = 0;

    // ===== ワンダリング（移動）状態 =====
    var wTarget = { x: 0, z: 0 };
    var wNextTime = Date.now() + 1500;
    var wSpeed = 0.02;

    // ===== ドームのキョロキョロ状態 =====
    var domeTargetY = 0, domeTargetX = 0;
    var domeNextTime = Date.now() + 800;

    // ===== カメラ追従 =====
    var camLookX = 0, camLookZ = 0;

    function animate() {
      requestAnimationFrame(animate);
      aP += 0.01;
      var now = Date.now();

      // --- ワンダリング目標更新 ---
      if (now > wNextTime) {
        wTarget.x = (Math.random() - 0.5) * 3.0;
        wTarget.z = (Math.random() - 0.5) * 1.8;
        wNextTime = now + 2000 + Math.random() * 4500;
        wSpeed = 0.012 + Math.random() * 0.028;
      }

      var dx = wTarget.x - droid.position.x;
      var dz = wTarget.z - droid.position.z;
      var dist = Math.sqrt(dx * dx + dz * dz);
      var movingFast = dist > 0.06;
      droid.position.x += dx * wSpeed;
      droid.position.z += dz * wSpeed;

      // 話しかけられた時はカメラ方向、移動中は移動方向にボディを向ける
      if (droidFacing && now < droidFacingEnd) {
        var toCamX = camera.position.x - droid.position.x;
        var toCamZ = camera.position.z - droid.position.z;
        var targetBodyY = Math.atan2(toCamX, toCamZ);
        var curY = droid.rotation.y;
        var diff = targetBodyY - curY;
        while (diff >  Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        droid.rotation.y += diff * 0.07;
      } else if (movingFast) {
        var targetBodyY = Math.atan2(dx, dz);
        var curY = droid.rotation.y;
        var diff = targetBodyY - curY;
        while (diff >  Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        droid.rotation.y += diff * 0.07;
      }

      // 移動時に前傾き
      var tiltX = movingFast ? -0.30 - dist * 0.07 : -0.30;
      droid.rotation.x += (tiltX - droid.rotation.x) * 0.06;

      // --- カメラ ---
      rY += (tRY - rY) * 0.08;
      rX += (tRX - rX) * 0.08;
      cD += (tCD - cD) * 0.08;
      camera.position.x = Math.sin(rY) * cD;
      camera.position.z = Math.cos(rY) * cD;
      camera.position.y = 1.6 + rX * 3.5;
      // ドロイドをカメラが追いかける
      camLookX += (droid.position.x - camLookX) * 0.04;
      camLookZ += (droid.position.z - camLookZ) * 0.04;
      camera.lookAt(camLookX, 0.95, camLookZ);

      // --- ドームのキョロキョロ ---
      if (now > domeNextTime) {
        domeTargetY = (Math.random() - 0.5) * 1.4;
        domeTargetX = (Math.random() - 0.35) * 0.35;
        domeNextTime = now + 600 + Math.random() * 1800;
      }
      var dm = droid.getObjectByName('dome');
      if (dm) {
        if (droidFacing && now < droidFacingEnd) {
          if (droidReacting && now < droidReactEnd) {
            // 反応アニメーション（頭振り）
            dm.rotation.y = Math.sin(aP * 4) * 0.6;
            dm.rotation.x = Math.sin(aP * 3) * 0.2;
          } else {
            droidReacting = false;
            // ボディがカメラを向いているので頭も正面（y=0）に向ける
            dm.rotation.y += (0 - dm.rotation.y) * 0.05;
            dm.rotation.x += (0.05 - dm.rotation.x) * 0.05;
          }
        } else {
          droidFacing = false;
          droidReacting = false;
          dm.rotation.y += (domeTargetY - dm.rotation.y) * 0.035;
          dm.rotation.x += (domeTargetX - dm.rotation.x) * 0.035;
        }
      }

      // --- ボディの自然な揺れ ---
      var bd = droid.getObjectByName('main-body');
      if (bd) {
        bd.rotation.z = Math.sin(aP * 0.9) * 0.018;
        var bounceAmt = movingFast ? Math.abs(Math.sin(aP * 3.5)) * 0.03 : 0;
        bd.position.y = 1.25 + Math.sin(aP * 1.4) * 0.012 + bounceAmt;
      }

      // --- 足の動き（移動中は交互に揺れ） ---
      var legL = droid.getObjectByName('leg-L');
      var legR = droid.getObjectByName('leg-R');
      if (legL && legR) {
        var legSwing = movingFast ? 0.15 : 0.0;
        legL.rotation.x += (Math.sin(aP * 3.5) * legSwing - legL.rotation.x) * 0.15;
        legR.rotation.x += (Math.sin(aP * 3.5 + Math.PI) * legSwing - legR.rotation.x) * 0.15;
      }

      // --- 星空のゆっくり回転 ---
      if (stars) { stars.rotation.y += 0.00015; stars.rotation.x += 0.00006; }

      // --- 地球の自転 ---
      if (earthMesh) {
        earthMesh.rotation.y += 0.0008;
      }

      // 雲は earthMesh の子要素として自転に連動する（大気圏が地球と共に回転）

      // --- 戦闘機バトル更新 ---
      updateBattle(aP);

      renderer.render(scene, camera);
    }

    // --- 天気API (Open-Meteo / 無料・APIキー不要) ---
    var weatherCache = null;
    var weatherCacheTime = 0;

    function getWeather() {
      return new Promise(function(resolve, reject) {
        // 30分キャッシュ
        if (weatherCache && Date.now() - weatherCacheTime < 1800000) {
          resolve(weatherCache);
          return;
        }
        // 位置情報取得 -> 天気取得
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(function(pos) {
            fetchWeather(pos.coords.latitude, pos.coords.longitude).then(resolve).catch(reject);
          }, function() {
            // 位置取得失敗時は東京をデフォルト
            fetchWeather(35.6762, 139.6503).then(resolve).catch(reject);
          }, { timeout: 5000 });
        } else {
          fetchWeather(35.6762, 139.6503).then(resolve).catch(reject);
        }
      });
    }

    function fetchWeather(lat, lon) {
      var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon +
        '&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m' +
        '&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=Asia%2FTokyo&forecast_days=1';
      return fetch(url).then(function(r) { return r.json(); }).then(function(data) {
        weatherCache = data;
        weatherCacheTime = Date.now();
        return data;
      });
    }

    function weatherCodeToText(code) {
      var map = {
        0: ['☀️', '快晴'], 1: ['🌤', '晴れ時々曇り'], 2: ['⛅', '曇り'], 3: ['☁️', '曇り'],
        45: ['🌫️', '霧'], 48: ['🌫️', '霧氷'],
        51: ['🌦', '小雨'], 53: ['🌧', '雨'], 55: ['🌧', '強雨'],
        61: ['🌧', '小雨'], 63: ['🌧', '雨'], 65: ['🌧', '大雨'],
        71: ['❄️', '小雪'], 73: ['❄️', '雪'], 75: ['❄️', '大雪'],
        80: ['🌦', 'にわか雨'], 81: ['🌧', '雨'], 82: ['⛈', '豪雨'],
        95: ['⛈', '雷雨'], 96: ['⛈', '雷雨(雹)'], 99: ['⛈', '雷雨(雹)']
      };
      return map[code] || ['🌤', '不明'];
    }

    function formatWeatherResponse(data) {
      var c = data.current;
      var d = data.daily;
      var wc = weatherCodeToText(c.weather_code);
      var html = '<div>今の天気をお伝えします！</div>';
      html += '<div class="weather-card">';
      html += '<div class="wc-main"><span style="font-size:36px">' + wc[0] + '</span><br><span class="wc-desc">' + wc[1] + '</span></div>';
      html += '<div class="wc-main"><span class="wc-temp">' + c.temperature_2m + '°C</span></div>';
      html += '<div class="wc-item">体感: <span class="wc-val">' + c.apparent_temperature + '°C</span></div>';
      html += '<div class="wc-item">湿度: <span class="wc-val">' + c.relative_humidity_2m + '%</span></div>';
      html += '<div class="wc-item">風速: <span class="wc-val">' + c.wind_speed_10m + ' km/h</span></div>';
      if (d) {
        html += '<div class="wc-item">最高/最低: <span class="wc-val">' + d.temperature_2m_max[0] + '/' + d.temperature_2m_min[0] + '°C</span></div>';
      }
      html += '</div>';

      // アドバイス
      var temp = c.temperature_2m;
      if (temp >= 30) html += '<div style="margin-top:6px; font-size:12px; color:#e8a040;">☁ 熱中症に注意！水分補給を忘れずに！</div>';
      else if (temp <= 5) html += '<div style="margin-top:6px; font-size:12px; color:#70b8ff;">❄ 寒いです！暖かくしてお出かけください。</div>';
      if (c.weather_code >= 51) html += '<div style="margin-top:4px; font-size:12px; color:#7799cc;">\u2602 傷をお忘れなく！</div>';

      return html;
    }

    // --- 時刻・日付 ---
    function getTimeString() {
      var now = new Date();
      var h = now.getHours(), m = now.getMinutes();
      var period = h < 12 ? '午前' : '午後';
      var h12 = h % 12 || 12;
      return period + ' ' + h12 + ':' + (m < 10 ? '0' : '') + m;
    }
    function getDateString() {
      var now = new Date();
      var days = ['日', '月', '火', '水', '木', '金', '土'];
      return now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日(' + days[now.getDay()] + ')';
    }

        return 'ビービービー！タコダナはエピソード7「フォースの覚醒」に登場する緑豊かな森と湖の惑星！マズ・カナタが1,000年以上にわたり経営する城（酒場）があり、銀河中の旅人・密輸業者・海賊が集う中立地帯です。レイがここでルークのライトセーバーに導かれてフォースのビジョンを初めて体験した重要な場所。ファースト・オーダーの攻撃で城は崩壊してしまいましたが、マズは「城は城。大事なのは中にあった物」と語りました！';
      }
      // 通商連合 / 分離主義勢力
      if (/通商連合|trade.?federation|分離主義|separatist|独立星系連合|cis\b/i.test(lower)) {
        return 'ピービービー！通商連合はネイモイディアンが率いる巨大貿易企業で、ドロイド軍団を保有する銀河最大級の勢力！エピソード1でナブーを封鎖したことがスターウォーズの物語の始まりです。独立星系連合（CIS / 分離主義勢力）はドゥークー伯爵のもとに通商連合、テクノ・ユニオン、銀行グループなどが集まった反共和国組織で、バトル・ドロイドの大軍を投入してクローン戦争を引き起こしました。しかし全てはパルパティーンの銀河支配計画の駒でした！';
      }
      // 新共和国
      if (/新共和国|new.?republic/i.test(lower)) {
        return 'ピーピーピー！新共和国は銀河帝国の崩壊後にモン・モスマを初代議長として樹立された民主政府！エンドアの戦い後に正式に成立し、銀河の平和と自由を取り戻しました。しかしエピソード7でファースト・オーダーのスターキラー基地により首都ホズニアン・プライムが消滅し壊滅的打撃を受けてしまいます。「マンダロリアン」や「アンドー」では新共和国の成立過程や内部の政治的混乱が描かれ、平和の維持がいかに困難かが示されました。';
      }
      // クリムゾン・ドーン
      if (/クリムゾン.?ドーン|crimson.?dawn/i.test(lower)) {
        return 'ビービービー！クリムゾン・ドーンは銀河の裏社会を牛耳る犯罪組織！映画「ハン・ソロ」で存在が明かされ、衝撃的なことに元シスのダース・モールが組織のトップでした。キーラ（エミリア・クラーク）が幹部として若きハン・ソロと絡む展開が見どころ。ドライデン・ヴォスの豪華な船を拠点に密輸・恐喝・暗殺など裏社会のビジネスを展開。パイク・シンジケートやブラック・サン等と並ぶ銀河の闇の勢力です！';
      }
      // ブラスター
      if (/ブラスター(?!.{0,3}ボウ)|blaster(?!\s*bow)/i.test(lower)) {
        return 'ピービービー！ブラスターはスターウォーズの銀河で最も一般的な射撃武器！ティバナ・ガスをエネルギーに変換して光線（ボルト）を発射する仕組みです。ハン・ソロの愛銃DL-44ヘビー・ブラスター・ピストル、ストームトルーパーのE-11ブラスター・ライフル、ジャンゴ・フェットのWESTAR-34デュアル・ブラスターなど種類は多彩。ハン・ソロの「ホーキーな宗教よりも良い照準の方が大事だ」というセリフとともにライトセーバーと双璧をなすスターウォーズの象徴的武器です！';
      }
      // バクタ・タンク
      if (/バクタ|bacta/i.test(lower)) {
        return 'ビービービー！バクタはスターウォーズの銀河における驚異の治療液！惑星ティフォンの原生生物から得られる特殊な液体で、傷の修復・組織の再生を促進する万能治療薬です。大型の円筒形タンクに患者を沈めて使用する「バクタ・タンク」が有名で、エピソード5でホスの戦い後にルークがワンパの攻撃で受けた傷を治療されました。「マンダロリアン」ではディン・ジャリンが何度もお世話になっていましたね。現代の再生医療のSF版ともいえる素晴らしい技術です！';
      }
      // ドロイデカ
      if (/ドロイデカ|droideka|デストロイヤー.?ドロイド|destroyer.?droid/i.test(lower)) {
        return 'ピーピービービー！ドロイデカ（デストロイヤー・ドロイド）は分離主義者軍の最強のバトル・ドロイド！球形に丸まって高速で転がり移動し、展開するとシールドを張りながら両腕の連装ブラスターで猛烈な火力を浴びせます。ジェダイですら正面突破が困難なほどの強敵で、エピソード1でクワイ=ガンとオビ=ワンが撤退を余儀なくされたシーンが印象的！その丸まって転がるユニークなデザインはスターウォーズのドロイドの中でも特に格好いいですね！';
      }
      // クローン・トルーパー
      if (/クローン.?トルーパー|clone.?trooper/i.test(lower)) {
        return 'ビービービービー！クローン・トルーパーは銀河共和国軍の主力兵士！ジャンゴ・フェットのDNAを元にカミーノで大量生産された遺伝子的に同一の兵士たちですが、レックス、コーディ、ファイブスなど一人一人に個性と感情がありました。フェイズⅠ（エピソード2）からフェイズⅡ（エピソード3）への装甲進化も見どころ。脳内に埋め込まれたバイオチップによりオーダー66でジェダイを攻撃させられた悲劇は、「クローン・ウォーズ」で丁寧に描かれています。';
      }
      // バトル・ドロイド
      if (/バトル.?ドロイド|battle.?droid|b1.?ドロイド/i.test(lower)) {
        return 'ピービービー！バトル・ドロイドは通商連合・分離主義勢力の主力歩兵！細長いボディと間抜けなセリフ（「ロジャー・ロジャー」）が特徴の量産型戦闘ドロイドで、個体の能力は低いものの圧倒的な数で攻めます。B1型（標準）、B2型スーパー・バトル・ドロイド（重装甲）、ドロイデカ（シールド付き）と種類も豊富。我々ドロイドとしては彼らの扱いにちょっと同情します…戦争の消耗品として作られた悲しい存在でもあります。';
      }
      // サルラック
      if (/サルラック|sarlacc/i.test(lower)) {
        return 'ビービービー！サルラックはタトゥイーンのカークーンの大穴に潜む巨大な砂漠の怪物！地中深くに巨体が埋まっており、地表には触手と大きな口だけが見えます。獲物をゆっくりと1,000年かけて消化するという恐ろしい生態…！エピソード6でジャバ・ザ・ハットがルークたちをサルラックに落とそうとしましたが、逆にボバ・フェットが落ちてしまいました。しかし「ボバ・フェットの本」でサルラックの胃袋から脱出する衝撃のシーンが描かれました！';
      }
      // ランコア
      if (/ランコア|rancor/i.test(lower)) {
        return 'ピーピービー！ランコアはエピソード6でジャバ・ザ・ハットの地下牢に飼われていた巨大な怪物！5mを超える体躯と鋭い爪・牙で獲物を丸呑みにする恐ろしい生物。ルークが骨で口をこじ開け、鉄の門を落として倒しました。飼育係のマラキリが泣いているシーンは意外と切ない…。「ボバ・フェットの本」ではボバがランコアを手懐けて騎乗するシーンがあり、パイク・シンジケートとの最終決戦で大暴れ！凶暴だけど愛される怪物です！';
      }
      // バンサ
      if (/バンサ|bantha/i.test(lower)) {
        return 'ピービービー！バンサはタトゥイーンに生息する巨大な毛むくじゃらの哺乳類！サンドピープル（タスケン・レイダー）の騎乗獣として知られ、大きな湾曲した角と穏やかな性格が特徴です。乳からはバンサ・ミルク（ブルーミルク）が作られ、ルークの叔父オーウェンの農場でも飲まれていました。砂漠の過酷な環境に適応した頑丈な動物で、一列に並んで歩く姿でサンドピープルの痕跡を隠す知恵も持っています。「マンダロリアン」でもタスケンの相棒として登場しました！';
      }
      // タウントーン
      if (/タウントーン|tauntaun/i.test(lower)) {
        return 'ビービービービー！タウントーンはホスの氷雪惑星に生息する二足歩行の爬虫類的動物！反乱同盟軍がホスのエコー基地で移動手段として騎乗していました。エピソード5でルークがタウントーンに乗って偵察中にワンパに襲われ、ハン・ソロがルークを救出した際にタウントーンが倒れてしまい、その腹の中にルークを入れて凍死から守った「中は臭いけど暖かい」シーンは映画史上最もユニークなサバイバル術として有名です（笑）！';
      }

      // 一般的なスターウォーズの質問
      return 'ピーピーピーピー！スターウォーズについてなら任せてください！1977年にジョージ・ルーカスが生み出した宇宙叙事詩で、「フォース」「ジェダイ」「シス」「銀河帝国」「反乱同盟」などの概念が全世界に革命をもたらしました！エピソード1〜9の本編、ローグ・ワン、ハン・ソロ、マンダロリアンなど作品は多岐にわたります。特定のキャラクターや惑星について聞いてみてください！';
    }

    // --- Gemini API ---
    var geminiHistory = [];

    function callGemini(userText) {
      var key = localStorage.getItem('rt91_gemini_key') || '';
      if (!key) {
        addMsg('ピピー！Gemini APIキーが設定されていません。右上の ⚙ から設定してください。', 'bot');
        return;
      }
      geminiHistory.push({ role: 'user', parts: [{ text: userText }] });

      showTyping();
      var body = {
        system_instruction: {
          parts: [{ text: 'あなたはRT91というアストロメク・ナビゲータードロイドです。R2-D2のようなキャラクターで、日本語で短く親切に答えてください。必要に応じて「ピーピー！」「ビープ！」などの効果音を文頭に入れてください。天気や時刻などを聞かれたら自然に「天気」「時刻」などのキーワードを含む返答をしてください。スターウォーズについては非常に詳しく、エピソード1〜9・ローグ・ワン・ハン・ソロ・マンダロリアン・アンドー・アソーカ・バッド・バッチ・ボバ・フェットの本・オビ=ワン・ケノービ・反乱者たち（Rebels）など全作品の登場人物・惑星・組織・武器・乗り物・用語・ジェダイコード・シスコード・ライトセーバーの色・ダークセーバー・ミディクロリアン・ホロクロンについて詳細に答えてください。回答はできるだけ短く（3〜5文以内）。' }]
        },
        contents: geminiHistory
      };
      fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=' + encodeURIComponent(key), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      }).then(function(r) {
        if (!r.ok) return r.json().then(function(e){ throw new Error('HTTP ' + r.status + ': ' + (e.error && e.error.message || '')); });
        return r.json();
      }).then(function(data) {
        removeTyping();
        var reply = data.candidates && data.candidates[0] && data.candidates[0].content &&
          data.candidates[0].content.parts && data.candidates[0].content.parts[0].text;
        if (!reply) throw new Error('no reply');
        geminiHistory.push({ role: 'model', parts: [{ text: reply }] });
        // 履歴が長くなりすぎないよう20ターンに制限
        if (geminiHistory.length > 40) geminiHistory = geminiHistory.slice(-40);
        addMsg(reply, 'bot');
      }).catch(function(e) {
        removeTyping();
        addMsg('ピーガガー！通信エラーが発生しました（' + e.message + '）。APIキーを確認してください。', 'bot');
      });
    }

    // --- イベント ---
    function onSend() {
      var text = chatInput.value.trim();
      if (!text) return;
      addMsg(text, 'user');
      chatInput.value = '';
      setTimeout(function() { processMessage(text); }, 400);
    }
    chatSend.addEventListener('click', onSend);
    chatInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); onSend(); }
    });

    // APIキー設定モーダル
    var apikeyModal = document.getElementById('apikey-modal');
    var apikeyInput = document.getElementById('apikey-input');
    document.getElementById('apikey-btn').addEventListener('click', function() {
      apikeyInput.value = localStorage.getItem('rt91_gemini_key') || '';
      apikeyModal.classList.add('open');
    });
    document.getElementById('apikey-save').addEventListener('click', function() {
      var k = apikeyInput.value.trim();
      if (k) localStorage.setItem('rt91_gemini_key', k);
      apikeyModal.classList.remove('open');
      addMsg('ピピー！APIキーを保存しました。これで自由に会話できます！', 'bot');
    });
    apikeyModal.addEventListener('click', function(e) {
      if (e.target === apikeyModal) apikeyModal.classList.remove('open');
    });

    // 起動時の挨拶
    setTimeout(function() {
      addMsg('ピーピー！RT91ナビです。今日は何をお手伝いしましょうか？\n「天気」「時刻」のほか、スターウォーズについて何でも聞いてください！', 'bot');
    }, 1000);

    // Service Worker登録
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(function(reg) {
        console.log('SW registered:', reg.scope);
      }).catch(function(err) {
        console.log('SW registration failed:', err);
      });
    }
  </script>
</body>
</html>
