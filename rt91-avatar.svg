<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <!-- Background -->
    <radialGradient id="bgGrad" cx="45%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1e2a4a"/>
      <stop offset="100%" stop-color="#060810"/>
    </radialGradient>

    <!-- Dome (head) - 3D sphere effect, off-center highlight -->
    <radialGradient id="domeGrad" cx="38%" cy="28%" r="70%">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="12%" stop-color="#dce8f8"/>
      <stop offset="35%" stop-color="#a8bcd8"/>
      <stop offset="65%" stop-color="#607090"/>
      <stop offset="100%" stop-color="#253045"/>
    </radialGradient>

    <!-- Dome rim shadow for roundness -->
    <radialGradient id="domeRim" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>

    <!-- Body cylinder - metallic silver -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#3a4a5c"/>
      <stop offset="12%" stop-color="#6a7f98"/>
      <stop offset="30%" stop-color="#c8d6e8"/>
      <stop offset="50%" stop-color="#e8f0f8"/>
      <stop offset="70%" stop-color="#b0c0d4"/>
      <stop offset="88%" stop-color="#607080"/>
      <stop offset="100%" stop-color="#2e3c4a"/>
    </linearGradient>

    <!-- Body vertical sheen -->
    <linearGradient id="bodySheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="46%" stop-color="#000000" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.30"/>
    </linearGradient>

    <!-- Blue accent panel -->
    <linearGradient id="bluePanel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#5070e0"/>
      <stop offset="100%" stop-color="#1a2eaa"/>
    </linearGradient>
    <linearGradient id="bluePanelSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.20"/>
    </linearGradient>

    <!-- Red band -->
    <linearGradient id="redBand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#e85050"/>
      <stop offset="40%" stop-color="#c02020"/>
      <stop offset="100%" stop-color="#800808"/>
    </linearGradient>

    <!-- Center chest panel - dark metallic -->
    <linearGradient id="chestGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#506070"/>
      <stop offset="50%" stop-color="#2a3545"/>
      <stop offset="100%" stop-color="#141e2a"/>
    </linearGradient>

    <!-- Eye lens - glass/photorealistic -->
    <radialGradient id="eyeOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#0a0e1e"/>
      <stop offset="100%" stop-color="#040608"/>
    </radialGradient>
    <radialGradient id="eyeIris" cx="40%" cy="38%" r="62%">
      <stop offset="0%"  stop-color="#3a60ff"/>
      <stop offset="35%" stop-color="#1430c8"/>
      <stop offset="70%" stop-color="#081080"/>
      <stop offset="100%" stop-color="#000820"/>
    </radialGradient>
    <radialGradient id="eyeGlare1" cx="35%" cy="30%" r="50%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeGlare2" cx="70%" cy="72%" r="40%">
      <stop offset="0%"  stop-color="#6090ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6090ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Dome stripe blue -->
    <linearGradient id="domeStripe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#3050d0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1020a0" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Soft drop shadow filter -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="glowEye" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="indicatorGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" fill="url(#bgGrad)"/>

  <!-- === BODY === -->
  <!-- Main body shape -->
  <ellipse cx="96" cy="122" rx="56" ry="62" fill="url(#bodyGrad)" filter="url(#softShadow)"/>
  <!-- Cylinder edge shading -->
  <ellipse cx="96" cy="122" rx="56" ry="62" fill="url(#bodySheen)"/>

  <!-- Blue side panels -->
  <rect x="46" y="102" width="22" height="28" rx="4" fill="url(#bluePanel)"/>
  <rect x="46" y="102" width="22" height="28" rx="4" fill="url(#bluePanelSheen)"/>
  <rect x="124" y="102" width="22" height="28" rx="4" fill="url(#bluePanel)"/>
  <rect x="124" y="102" width="22" height="28" rx="4" fill="url(#bluePanelSheen)"/>

  <!-- Center chest plate -->
  <rect x="76" y="99" width="40" height="34" rx="3" fill="url(#chestGrad)"/>
  <!-- Chest panel inner bevel -->
  <rect x="78" y="101" width="36" height="30" rx="2" fill="none" stroke="#607080" stroke-width="1" opacity="0.6"/>
  <!-- Chest indicator dot row -->
  <circle cx="88" cy="109" r="3" fill="#30c0ff" opacity="0.9" filter="url(#indicatorGlow)"/>
  <circle cx="96" cy="109" r="3" fill="#ffb020" opacity="0.85" filter="url(#indicatorGlow)"/>
  <circle cx="104" cy="109" r="3" fill="#30c0ff" opacity="0.9" filter="url(#indicatorGlow)"/>
  <!-- Chest horizontal slot -->
  <rect x="80" y="117" width="32" height="5" rx="2" fill="#0a1520"/>
  <rect x="80" y="117" width="32" height="2" rx="1" fill="#204060" opacity="0.6"/>

  <!-- Red equator band -->
  <rect x="40" y="90" width="112" height="11" rx="2" fill="url(#redBand)"/>
  <!-- Band top highlight -->
  <rect x="40" y="90" width="112" height="4" rx="2" fill="#ff7070" opacity="0.35"/>

  <!-- Body bottom fade -->
  <ellipse cx="96" cy="176" rx="44" ry="12" fill="#000000" opacity="0.45"/>

  <!-- === DOME / HEAD === -->
  <!-- Head base collar -->
  <ellipse cx="96" cy="88" rx="55" ry="10" fill="#1a2535"/>
  <ellipse cx="96" cy="86" rx="55" ry="10" fill="url(#bodyGrad)" opacity="0.6"/>

  <!-- Main dome sphere -->
  <ellipse cx="96" cy="62" rx="53" ry="46" fill="url(#domeGrad)" filter="url(#softShadow)"/>
  <!-- Dome rim darkening for depth -->
  <ellipse cx="96" cy="62" rx="53" ry="46" fill="url(#domeRim)"/>

  <!-- Blue dome stripe/band -->
  <clipPath id="domeClip">
    <ellipse cx="96" cy="62" rx="53" ry="46"/>
  </clipPath>
  <rect x="43" y="52" width="106" height="22" fill="url(#domeStripe)" clip-path="url(#domeClip)"/>

  <!-- Eye socket recess -->
  <circle cx="96" cy="64" r="21" fill="#050810" opacity="0.7"/>

  <!-- Eye outer ring - metallic bezel -->
  <circle cx="96" cy="64" r="20" fill="#1a2535"/>
  <circle cx="96" cy="64" r="19" fill="#0a1020"/>
  <!-- Eye bezel highlight arc -->
  <path d="M 78 54 A 20 20 0 0 1 114 54" fill="none" stroke="#8099bb" stroke-width="2" opacity="0.7"/>

  <!-- Eye lens -->
  <circle cx="96" cy="64" r="16" fill="url(#eyeOuter)"/>
  <circle cx="96" cy="64" r="14" fill="url(#eyeIris)" filter="url(#glowEye)"/>
  <!-- Eye pupil -->
  <circle cx="96" cy="64" r="5" fill="#000410"/>
  <circle cx="96" cy="64" r="4" fill="#001060" opacity="0.7"/>
  <!-- Eye glow ring -->
  <circle cx="96" cy="64" r="14" fill="none" stroke="#3a5eff" stroke-width="1.2" opacity="0.5"/>
  <!-- Primary specular glare (key light) -->
  <ellipse cx="89" cy="57" rx="5" ry="4" fill="url(#eyeGlare1)"/>
  <!-- Secondary glare (fill light) -->
  <ellipse cx="103" cy="71" rx="3" ry="2.5" fill="url(#eyeGlare2)"/>
  <!-- Tiny specular pinpoint -->
  <circle cx="87" cy="56" r="1.8" fill="#ffffff" opacity="0.95"/>

  <!-- Dome panel details -->
  <!-- Left detail panel -->
  <rect x="52" y="60" width="16" height="10" rx="2" fill="#1a2a40" opacity="0.6"/>
  <rect x="53" y="61" width="14" height="4" rx="1" fill="#304060" opacity="0.5"/>
  <!-- Right detail panel -->
  <rect x="124" y="60" width="16" height="10" rx="2" fill="#1a2a40" opacity="0.6"/>
  <rect x="125" y="61" width="14" height="4" rx="1" fill="#304060" opacity="0.5"/>

  <!-- Indicator lights on dome -->
  <circle cx="62" cy="72" r="4" fill="#ff2020" filter="url(#indicatorGlow)"/>
  <circle cx="62" cy="72" r="2.5" fill="#ff6060"/>
  <circle cx="130" cy="72" r="4" fill="#2040ff" filter="url(#indicatorGlow)"/>
  <circle cx="130" cy="72" r="2.5" fill="#6080ff"/>

  <!-- Dome top specular highlight -->
  <ellipse cx="82" cy="38" rx="18" ry="10" fill="#ffffff" opacity="0.12"/>
  <ellipse cx="80" cy="36" rx="10" ry="5" fill="#ffffff" opacity="0.14"/>

  <!-- RT91 label -->
  <text x="96" y="183" text-anchor="middle" fill="#4a6080" font-family="'Courier New',monospace" font-size="13" font-weight="bold" letter-spacing="2">RT91</text>
</svg>
